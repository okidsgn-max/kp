<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор коммерческого предложения</title>
    <style>
        :root {
            --button-color: #00b398;
            --button-hover: #008f79;
            --button-text: white;
            --text-color: #667099;
            --active-color: #008f79;
            --input-bg: #f6f6f9;
            --input-border: hsl(228, 20%, 97%);
            --sidebar-width: 30vw;
            --preview-width: 70vw;
            --qr-size: 60px;
            --control-icon-size: 30px;
        }
        
        body {
            font-family: 'SB Sans', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            background-color: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .popup-text {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
        }
        
        .menu-container {
            width: var(--sidebar-width);
            background-color: white;
            padding: 20px;
            height: 100%;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        
        .menu-header-container {
            display: flex;
            flex-direction: column;
            margin-bottom: 30px;
        }
        
        .menu-logo {
            height: 24px;
            width: auto;
            object-fit: contain;
            align-self: flex-start;
            margin-bottom: 16px;
        }
        
        .menu-title {
            color: #3d435c;
            font-weight: 600;
            font-size: 24px;
            font-family: 'SBSansText', sans-serif;
        }
        
        .menu-sections {
            flex-grow: 1;
            overflow-y: auto;
        }
        
        .menu-section-header {
            color: #3d435c;
            font-weight: 600;
            font-size: 16px;
        }
        
        .menu-section-header.active {
            color: var(--active-color);
        }
        
        .menu-label {
            color: #667099;
            font-weight: 600;
            font-size: 16px;
            display: block;
            margin-bottom: 8px;
        }
        
        .preview-container {
            width: var(--preview-width);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
            position: relative;
            background-color: #f8f8f8;
        }
        
        .preview-wrapper {
            position: relative;
            margin-bottom: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            height: 90%;
            transition: filter 0.3s ease-in-out;
        }

        .preview-wrapper.blurred {
            filter: blur(8px);
        }
        
        .preview-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
        }
        
        .delete-slide-btn {
            background-color: transparent;
            border: none;
            cursor: pointer;
            width: 24px;
            height: 24px;
            padding: 0;
        }
        
        .delete-slide-btn img {
            width: 100%;
            height: 100%;
        }
        
        .slide-controls-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            width: 100%;
        }
        
        .slide-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
        }
        
        #slideNumbers {
            display: flex;
            gap: 8px;
        }
        
        .control-icon {
            width: var(--control-icon-size);
            height: var(--control-icon-size);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .control-icon img {
            width: 24px;
            height: 24px;
        }
        
        .slide-number {
            width: var(--control-icon-size);
            height: var(--control-icon-size);
            border-radius: 50%;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 500;
            color: #3d435c;
            user-select: none;
            transition: transform 0.3s ease;
        }
        
        .slide-number.active {
            background-color: var(--button-color);
            color: white;
        }
        
        .slide-number.dragging {
            opacity: 0.5;
            transform: scale(1.2);
        }
        
        .slide-number.drop-target {
            transform: scale(1.1);
            background-color: var(--button-hover);
            color: white;
        }
        
        .preview-page {
            position: relative;
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            transform-origin: center center;
            cursor: pointer;
            aspect-ratio: 16 / 9;
            margin: auto;
        }
        
        .preview-page.zoomed {
            transform: scale(1.4);
            z-index: 100;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.4);
            max-width: 70vw;
            max-height: 70vh;
        }
        
        .preview-bg {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }
        
        .preview-banner {
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            width: 100%;
            object-fit: fill;
        }
        
        .preview-logos {
            position: absolute;
            bottom: 6%;
            left: 2%;
            width: 50%;
            max-height: 15%;
            object-fit: contain;
        }
        
        .preview-price {
            position: absolute;
            top: 65%;
            left: 3%;
            color: white;
            font-weight: bold;
            width: 50%;
            font-size: 22px;
            font-family: Calibri, Arial, sans-serif;
        }
        
        .preview-comment {
            position: absolute;
            top: 60%;
            left: 3%;
            color: #D9D9D9;
            width:100%;
            font-weight: 500;
            font-size: 12px;
        }
        
        .price-table {
            position: absolute;
            top: 55%;
            left: 3%;
            width:60%;
            color: white;
            border-collapse: collapse;
            font-size: 12px;
            font-family: Calibri, Arial, sans-serif;
        }
        
        .price-table th, .price-table td {
            padding: 10px;
            text-align: left;
            border: 1px solid #303030;
        }
        
        .price-table th {
            background-color: rgba(0,0,0,0.3);
        }
        
        .preview-manager {
            position: absolute;
            bottom: 8%;
            left: 0%;
            width: 100%;
            object-fit: contain;
            pointer-events: none; /* Картинка не будет перехватывать клики */
        }
        
        .preview-phone {
            position: absolute;
            bottom: 16%;
            left: 32%;
            color: white;
            font-weight: 500;
            font-size: 7px;
        }
        
        .preview-qr {
            position: absolute;
            bottom: 8%;
            right: 39%;
            width: var(--qr-size);
            height: var(--qr-size);
            background-color: white;
            border-radius: 8px;
            padding:7px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .preview-qr img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .preview-link {
            position: absolute;
            bottom: 5%;
            right: 5%;
            color: transparent; 
        }
        
        .menu-section {
            margin-bottom: 8px;
            border-bottom: 1px solid #eee;
            padding-bottom: 2px;
        }
        
        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .menu-content {
            display: none;
            padding-left: 0px;
        }
        
        .menu-content.active {
            display: block;
        }
        
        .toggle-button {
            font-size: 26px;
            color: #3d435c;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid var(--input-border);
            background-color: var(--input-bg);
            border-radius: 8px;
            color: var(--text-color);
            font-weight: 500;
            font-size: 16px;
            font-family: 'SB Sans', sans-serif;
            box-sizing: border-box;
        }
        
        input[type="number"] {
            -moz-appearance: textfield;
        }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: var(--button-color);
        }
        
        .radio-group {
            margin-bottom: 15px;
        }
        
        .radio-option {
            margin-bottom: 0px;
            display: flex;
            align-items: baseline;
        }
        
        .radio-option input {
            width: auto;
            margin-right: 4px;
        }
        
        .radio-option label {
            color: var(--text-color);
            font-weight: 500;
            font-size: 16px;
        }
        
        .price-columns {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .price-column {
            flex: 1;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top:20px;
            position: sticky;
            bottom: 0;
            background: white;
            z-index: 10;
        }
        
        button {
            padding: 12px 12px;
            background-color: var(--button-color);
            color: var(--button-text);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'SB Sans', sans-serif;
            font-size: 16px;
            font-weight: 500;
            transition: background-color 0.3s;
            flex: 1;
        }
        
        button:hover {
            background-color: var(--button-hover);
        }
        
        .add-slide-btn {
            background-color: var(--button-color);
            color: white;
            margin-top: 10px;
        }
        
        .remove-slide-btn {
            background-color: #7F7F7F;
            color: white;
            margin-top: 10px;
        }
        
        .hidden {
            display: none;
        }
        
        .phone-type {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .phone-type label {
            display: flex;
            align-items: baseline;
            gap: 5px;
            color: var(--text-color);
            font-weight: 500;
            font-size: 16px;
        }

        .instruction-text {
            position: absolute;
            top: 40%;
            left: 3%;
            color: white;
            font-weight: 500;
            width: 60%;
            line-height: 1.2;
            font-size: 12px;
        }

        .instruction-text a {
            color: var(--button-color);
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
        }

        .creative-asset-link {
            position: absolute;
            display: block;
        }
        .preview-mode .creative-asset-link {
            width: 78px;
            height: 78px;
            transition: all 0.2s ease-in-out;
        }
        .preview-mode .creative-asset-link:hover {
            transform: scale(1.1);
        }
        .pdf-mode .creative-asset-link {
            width: 130px;
            height: 130px;
        }
        .creative-asset-link img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
            
        .pdf-mode .preview-price {
            font-size: 44px;
        }
        .pdf-mode .preview-comment {
            font-size: 24px;
        }
        .pdf-mode .price-table {
            font-size: 24px;
        }
        .pdf-mode .price-table th, .pdf-mode .price-table td {
             padding: 20px;
        }
        .pdf-mode .preview-phone {
            font-size: 14px;
        }
        .pdf-mode .instruction-text {
            font-size: 24px;
            line-height: 1.5;
        }
      
        @-moz-document url-prefix() {
            .menu-container {
                scrollbar-width: thin;
            }
        }

        @media (max-width: 800px) {
            body {
                flex-direction: column;
                height: auto;
                overflow: auto;
            }

            .menu-container {
                width: 100%;
                height: auto;
                overflow-y: visible;
                box-shadow: none;
                padding: 15px;
                box-sizing: border-box;
            }
            
            .action-buttons {
                position: relative;
                bottom: auto;
                padding: 20px 0 10px 0;
                border-top: 1px solid #eee;
            }

            .preview-container {
                width: 100%;
                height: auto;
                padding: 10px;
                box-sizing: border-box;
            }
            
            .preview-wrapper {
                height: auto;
            }

            .preview-page {
                cursor: default;
            }
            
            .control-icon[onclick="toggleZoom()"] {
                display: none;
            }
            
            .menu-logo {
                margin-bottom: 20px;
            }
        }
    </style>
</head>

                    <span class="toggle-button">+</span>
                </div>
                <div class="menu-content">
                    <label class="menu-label">Стоимость, ₽/мес:</label>
                    <input type="number" id="premiumPrice" value="1990">
                    
                    <label class="menu-label">Комментарий:</label>
                    <input type="text" id="premiumComment" placeholder="Введите комментарий">
                    
                    <button class="add-slide-btn" onclick="addSlide('premium')">Добавить слайд</button>
                    <button class="remove-slide-btn" onclick="removeSlide('premium')">Удалить слайд</button>
                </div>
            </div>
            
            <div class="menu-section">
                <div class="menu-header" onclick="toggleMenu(this, 'bprofile')">
                    <span class="menu-section-header">9. Бизнес-профиль</span>
                    <span class="toggle-button">+</span>
                </div>
                <div class="menu-content">
                    <button class="add-slide-btn" onclick="addSlide('bprofile')">Добавить слайд</button>
                    <button class="remove-slide-btn" onclick="removeSlide('bprofile')">Удалить слайд</button>
                </div>
            </div>
            
            <div class="menu-section">
                <div class="menu-header" onclick="toggleMenu(this, 'videokp')">
                    <span class="menu-section-header">10. Видео КП</span>
                    <span class="toggle-button">+</span>
                </div>
                <div class="menu-content">
                    <label class="menu-label">Стоимость, ₽/мес:</label>
                    <input type="number" id="videokpPrice" value="1990">
                    
                    <label class="menu-label">Комментарий:</label>
                    <input type="text" id="videokpComment" placeholder="Введите комментарий">
                    
                    <button class="add-slide-btn" onclick="addSlide('videokp')">Добавить слайд</button>
                    <button class="remove-slide-btn" onclick="removeSlide('videokp')">Удалить слайд</button>
                </div>
            </div>
            
            <div class="menu-section">
                <div class="menu-header" onclick="toggleMenu(this, 'videocontent')">
                    <span class="menu-section-header">11. Видеоконтент</span>
                    <span class="toggle-button">+</span>
                </div>
                <div class="menu-content">
                    <button class="add-slide-btn" onclick="addSlide('videocontent')">Добавить слайд</button>
                    <button class="remove-slide-btn" onclick="removeSlide('videocontent')">Удалить слайд</button>
                </div>
            </div>
        </div>
        
        <div class="action-buttons">
           
            <button onclick="saveAsPDF()">в PDF</button>
        
        </div>
    </div>
    
    <div class="preview-container">
        <div class="preview-wrapper" id="previewWrapper">
            <div id="slideContainer">
                <div class="preview-page" id="currentSlide" onclick="toggleZoom()"></div>
            </div>
        </div>
            
        <div class="slide-controls-container">
            <div class="slide-controls">
                <div class="control-icon" onclick="toggleZoom()">
                    <img src="zoom.svg" alt="Zoom">
                </div>
                <div id="slideNumbers"></div>
                <div class="control-icon" onclick="removeCurrentSlide()">
                    <img src="delete.svg" alt="Delete">
                </div>
            </div>
        </div>
    </div>

    <div id="pdf-popup" class="popup-overlay">
        <div class="popup-text">Сохраняем PDF...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    
    <script>
        // Инициализация jsPDF
        const { jsPDF } = window.jspdf;
        
        // Массив для хранения слайдов
        const slides = [
            { type: 'general' },
            { type: 'pricing' },
            { type: 'instruction' }
        ];
        
        // Ссылки для баннеров
        const bannerLinks = {
            'images/bkids.png': 'https://zvuk-b2b.com/music_for_kids',
            'images/veranda.png': 'https://zvuk-b2b.com/rest',
            'images/autumn.png': 'https://zvuk-b2b.com',
            'images/nostalgia.png': 'https://zvuk-b2b.com',
            'images/sbbarbershop.png': 'https://zvuk-b2b.com',
            'images/sbcafe.png': 'https://zvuk-b2b.com',
            'images/sbfitnes.png': 'https://zvuk-b2b.com',
            'images/sbpizza.png': 'https://zvuk-b2b.com',
            'images/sbspa.png': 'https://zvuk-b2b.com',
            'images/sbretail.png': 'https://zvuk-b2b.com',
            'images/sbmall.png': 'https://zvuk-b2b.com',
            'images/sbsushi.png': 'https://zvuk-b2b.com',
            'images/play.png': 'https://zvuk-b2b.com/player',
            'images/action.png': 'https://zvuk-b2b.com',
            'images/creative-audio.png': 'https://zvuk-b2b.com/blog/1price',
            'images/georgia-audio.png': 'https://zvuk-b2b.com/gastrobar#menu1',
            'images/barber-audio.png': 'https://zvuk-b2b.com/barbershop',
            'images/parterprogram.png': 'https://zvuk-b2b.com/partners',
            'images/app.png': 'https://zvuk-b2b.com/blog/1price',
            'images/premium.png': 'https://zvuk-b2b.com/premium/',
            'images/bprofile.png': 'https://zvuk-b2b.com/bprofile',
            'images/videokp.png': 'https://zvuk-b2b.com/video',
            'images/videowave.png': 'https://zvuk-b2b.com/video',
            'images/demovideo.png': 'https://zvuk-b2b.com/video',
            'images/coffeoneprice.png': 'https://zvuk-b2b.com/blog/1price',
            'images/letual.png': 'https://zvuk-b2b.com/blog/letu',
            'images/createbanner.png': 'https://zvuk-b2b.com/audio_ads',
            'images/bprofile phone.png': 'https://zvuk-b2b.com/partners',
            'images/premiumbanner.png': 'https://zvuk-b2b.com/premium/',
            'images/bprofilescreen.png': 'https://zvuk-b2b.com/bprofile',
            'images/atmvieo.png': 'https://zvuk-b2b.com/video'
        };
        
        let currentSlideIndex = 0;
        let isZoomed = false;
        let draggedSlideIndex = null;
        
        function toggleMenu(header, type) {
            document.querySelectorAll('.menu-content.active').forEach(content => {
                if (content !== header.nextElementSibling) {
                    content.classList.remove('active');
                    content.previousElementSibling.querySelector('.toggle-button').textContent = '+';
                    content.previousElementSibling.querySelector('.menu-section-header').classList.remove('active');
                }
            });
            
            const content = header.nextElementSibling;
            const button = header.querySelector('.toggle-button');
            const headerText = header.querySelector('.menu-section-header');
            
            if (content.classList.contains('active')) {
                content.classList.remove('active');
                button.textContent = '+';
                headerText.classList.remove('active');
            } else {
                content.classList.add('active');
                button.textContent = '-';
                headerText.classList.add('active');
                
                const slideIndex = slides.findIndex(slide => slide.type === type);
                if (slideIndex !== -1) {
                    showSlide(slideIndex + 1);
                }
            }
        }
        
        function toggleZoom() {
            if (window.innerWidth <= 800) return;
            const slide = document.getElementById('currentSlide');
            slide.classList.toggle('zoomed');
            isZoomed = !isZoomed;
        }
        
        document.querySelectorAll('input[name="phoneType"], input[name="priceColumns"]').forEach(radio => {
            radio.addEventListener('change', updateCurrentSlide);
        });
        
        // Функция для построения DOM-структуры слайда на основе его типа и данных
        function buildSlideHTML(slide) {
            const slideContainer = document.createElement('div');
            const bgImg = document.createElement('img');
            bgImg.className = 'preview-bg';

            switch(slide.type) {
                case 'general':
                    bgImg.src = 'images/Backprice1.png';
                    slideContainer.appendChild(bgImg);
                    
                    const bannerImg = document.createElement('img');
                    bannerImg.className = 'preview-banner';
                    bannerImg.src = document.getElementById('banner').value;
                    
                    const bannerLink = document.createElement('a');
                    bannerLink.href = bannerLinks[document.getElementById('banner').value] || '#';
                    bannerLink.target = '_blank';
                    bannerLink.style.cssText = 'position:absolute; top:0; right:0; width:35%; height:100%;';
                    bannerLink.appendChild(bannerImg);
                    slideContainer.appendChild(bannerLink);
                    
                    const logosImg = document.createElement('img');
                    logosImg.className = 'preview-logos';
                    logosImg.src = document.getElementById('logos').value;
                    slideContainer.appendChild(logosImg);
                    break;
                    
                case 'pricing':
                    const priceFormat = document.querySelector('input[name="priceColumns"]:checked').value;
                    bgImg.src = priceFormat === '1' ? 'images/1price.png' : 'images/3price.png';
                    slideContainer.appendChild(bgImg);
                    
                    const priceBannerImg = document.createElement('img');
                    priceBannerImg.className = 'preview-banner';
                    priceBannerImg.src = document.getElementById('priceBanner').value;
                    
                    const priceBannerLink = document.createElement('a');
                    priceBannerLink.href = bannerLinks[document.getElementById('priceBanner').value] || '#';
                    priceBannerLink.target = '_blank';
                    priceBannerLink.style.cssText = 'position:absolute; top:0; right:0; width:35%; height:100%;';
                    priceBannerLink.appendChild(priceBannerImg);
                    slideContainer.appendChild(priceBannerLink);
                    
                    const managerSelect = document.getElementById('manager');
                    const selectedManagerOption = managerSelect.options[managerSelect.selectedIndex];
                    const managerImgSrc = selectedManagerOption.value;
                    const managerDataLink = selectedManagerOption.getAttribute('data-link');
                    const phoneType = document.querySelector('input[name="phoneType"]:checked').value;
                    const managerImgPath = phoneType === 'personal' ? managerImgSrc.replace('.png', '-ph.png') : managerImgSrc;
                    
                    const managerImg = document.createElement('img');
                    managerImg.className = 'preview-manager';
                    managerImg.src = managerImgPath;
                    slideContainer.appendChild(managerImg);
                    
                    // ИЗМЕНЕНИЕ: Отдельный прозрачный шейп-ссылка для менеджера
                    const managerLink = document.createElement('a');
                    managerLink.href = managerDataLink;
                    managerLink.target = '_blank';
                    managerLink.style.cssText = 'position:absolute; display:block; bottom:8%; left:3%; width:58%; height:15%; background:transparent;';
                    slideContainer.appendChild(managerLink);
                    
                    if (phoneType === 'personal' && document.getElementById('personalPhone').value) {
                        const phoneValue = document.getElementById('personalPhone').value;
                        const phoneDiv = document.createElement('div');
                        phoneDiv.className = 'preview-phone';
                        phoneDiv.textContent = phoneValue;
                        slideContainer.appendChild(phoneDiv);
                        
                        const qrDiv = document.createElement('div');
                        qrDiv.className = 'preview-qr';
                        const qrImg = document.createElement('img');
                        qrImg.src = generateQRCode(phoneValue);
                        qrDiv.appendChild(qrImg);
                        
                        const qrLink = document.createElement('a');
                        qrLink.href = `tel:${phoneValue}`;
                        qrLink.target = '_blank';
                        qrLink.style.cssText = 'position:absolute; bottom:8%; right:39%;';
                        qrLink.style.width = 'var(--qr-size)';
                        qrLink.style.height = 'var(--qr-size)';
                        qrLink.appendChild(qrDiv);
                        slideContainer.appendChild(qrLink);
                    }
                    
                    if (priceFormat === '1') {
                        const priceDiv = document.createElement('div');
                        priceDiv.className = 'preview-price';
                        priceDiv.textContent = formatPrice(document.getElementById('price1Value').value) + ' ₽/мес.';
                        slideContainer.appendChild(priceDiv);
                        
                        const commentDiv = document.createElement('div');
                        commentDiv.className = 'preview-comment';
                        commentDiv.textContent = document.getElementById('comment').value;
                        slideContainer.appendChild(commentDiv);
                    } else {
                        const table = document.createElement('table');
                        table.className = 'price-table';
                        table.innerHTML = `
                            <thead>
                                <tr><th>Количество точек</th><th>1-3</th><th>4-9</th><th>10+</th></tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Стоимость за точку</td>
                                    <td>${formatPrice(document.getElementById('price3Value1').value)} ₽</td>
                                    <td>${formatPrice(document.getElementById('price3Value2').value)} ₽</td>
                                    <td>${formatPrice(document.getElementById('price3Value3').value)} ₽</td>
                                </tr>
                            </tbody>`;
                        slideContainer.appendChild(table);
                    }
                    break;
                    
                case 'instruction':
                    bgImg.src = 'images/instruct.png';
                    slideContainer.appendChild(bgImg);

                    const managerSelectForLink = document.getElementById('manager');
                    const managerRegLink = managerSelectForLink.options[managerSelectForLink.selectedIndex].getAttribute('data-link');

                    const instructionTextDiv = document.createElement('div');
                    instructionTextDiv.className = 'instruction-text';
                    instructionTextDiv.innerHTML = `
                        1. Зарегистрироваться <a href="${managerRegLink}" target="_blank">по ссылке</a>.<br><br>
                        2. Установить приложение на <a href="https://help.zvuk-b2b.com/onair#desktop" target="_blank">компьютер</a> или <a href="https://help.zvuk-b2b.com/onair#desktop" target="_blank">смартфон</a>.<br><br>
                        3. С вами свяжется менеджер в течение 1-2 часов.<br><br>
                        4. Протестировать в течение 7 дней, оформить подписку.`;
                    slideContainer.appendChild(instructionTextDiv);
                    break;
                    
                case 'app':
                    bgImg.src = 'images/app.png';
                    slideContainer.appendChild(bgImg);
                    break;
                    
                case 'creative':
                    bgImg.src = 'images/createbanner.png';
                    slideContainer.appendChild(bgImg);
                    
                    const coffeLink = document.createElement('a');
                    coffeLink.href = 'https://zvuk-b2b.com/blog/1price';
                    coffeLink.target = '_blank';
                    coffeLink.className = 'creative-asset-link';
                    coffeLink.style.cssText = 'bottom: 23%; left: 3%;';
                    coffeLink.innerHTML = `<img src="images/coffeoneprice.png">`;
                    slideContainer.appendChild(coffeLink);
                    
                    const letualLink = document.createElement('a');
                    letualLink.href = 'https://zvuk-b2b.com/blog/letu';
                    letualLink.target = '_blank';
                    letualLink.className = 'creative-asset-link';
                    letualLink.style.cssText = 'bottom: 23%; right: 25%;';
                    letualLink.innerHTML = `<img src="images/letual.png">`;
                    slideContainer.appendChild(letualLink);
                    break;
                    
                case 'playlist':
                    bgImg.src = document.getElementById('playlist').value;
                    slideContainer.appendChild(bgImg);
                    break;
                    
                case 'partner':
                    bgImg.src = 'images/parterprogram.png';
                    slideContainer.appendChild(bgImg);
                    break;
                    
                case 'premium':
                    bgImg.src = 'images/premiumbanner.png';
                    slideContainer.appendChild(bgImg);
                    const premiumPriceDiv = document.createElement('div');
                    premiumPriceDiv.className = 'preview-price';
                    premiumPriceDiv.textContent = formatPrice(document.getElementById('premiumPrice').value) + ' ₽/мес.';
                    slideContainer.appendChild(premiumPriceDiv);
                    const premiumCommentDiv = document.createElement('div');
                    premiumCommentDiv.className = 'preview-comment';
                    premiumCommentDiv.textContent = document.getElementById('premiumComment').value;
                    slideContainer.appendChild(premiumCommentDiv);
                    break;
                    
                case 'bprofile':
                    bgImg.src = 'images/bprofile.png';
                    slideContainer.appendChild(bgImg);
                    break;
                    
                case 'videokp':
                    bgImg.src = 'images/atmvieo.png';
                    slideContainer.appendChild(bgImg);
                    const videoPriceDiv = document.createElement('div');
                    videoPriceDiv.className = 'preview-price';
                    videoPriceDiv.textContent = formatPrice(document.getElementById('videokpPrice').value) + ' ₽/мес.';
                    slideContainer.appendChild(videoPriceDiv);
                    const videoCommentDiv = document.createElement('div');
                    videoCommentDiv.className = 'preview-comment';
                    videoCommentDiv.textContent = document.getElementById('videokpComment').value;
                    slideContainer.appendChild(videoCommentDiv);
                    break;
                    
                case 'videocontent':
                    bgImg.src = 'images/videowave.png';
                    slideContainer.appendChild(bgImg);
                    break;
            }
            return slideContainer;
        }

        function updateCurrentSlide() {
            const slideContainer = document.getElementById('currentSlide');
            slideContainer.innerHTML = '';
            const slideHTML = buildSlideHTML(slides[currentSlideIndex]);
            // Копируем дочерние элементы, чтобы не перемещать их напрямую
            while (slideHTML.firstChild) {
                slideContainer.appendChild(slideHTML.firstChild.cloneNode(true));
            }
        }
        
        function generateQRCode(text) {
            return `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(text)}&bgcolor=transparent&color=667099`;
        }
        
        function showSlide(index) {
            if (index < 1 || index > slides.length) return;
            currentSlideIndex = index - 1;
            document.querySelectorAll('.slide-number').forEach((btn, i) => {
                btn.classList.toggle('active', i === currentSlideIndex);
            });
            updateCurrentSlide();
        }
        
        function removeCurrentSlide() {
            if (currentSlideIndex > 2) {
                removeSlide(slides[currentSlideIndex].type);
            }
        }
        
        function addSlide(type) {
            const newSlide = { type };
            slides.push(newSlide);
            updateSlideNumbers();
            showSlide(slides.length);
        }
        
        function removeSlide(type) {
            if (slides.length <= 3) return;
            const indexToRemove = slides.findLastIndex(slide => slide.type === type);
            if (indexToRemove > 2) {
                slides.splice(indexToRemove, 1);
                updateSlideNumbers();
                if (currentSlideIndex >= slides.length) {
                    showSlide(slides.length);
                } else {
                    showSlide(currentSlideIndex + 1);
                }
            }
        }
        
        function updateSlideNumbers() {
            const slideNumbers = document.getElementById('slideNumbers');
            slideNumbers.innerHTML = '';
            slides.forEach((slide, i) => {
                const number = document.createElement('div');
                number.className = `slide-number ${i === currentSlideIndex ? 'active' : ''}`;
                number.textContent = i + 1;
                number.draggable = i >= 3;
                number.dataset.index = i;
                number.addEventListener('dragstart', handleDragStart);
                number.addEventListener('dragover', handleDragOver);
                number.addEventListener('drop', handleDrop);
                number.addEventListener('dragend', handleDragEnd);
                number.onclick = () => showSlide(i + 1);
                slideNumbers.appendChild(number);
            });
        }
        
        function handleDragStart(e) {
            draggedSlideIndex = parseInt(e.target.dataset.index);
            e.target.classList.add('dragging');
        }
        
        function handleDragOver(e) {
            e.preventDefault();
        }
        
        function handleDrop(e) {
            e.preventDefault();
            const target = e.target.closest('.slide-number');
            if (!target) return;
            const targetIndex = parseInt(target.dataset.index);
            if (draggedSlideIndex !== null && draggedSlideIndex >= 3 && targetIndex >= 3) {
                const temp = slides[draggedSlideIndex];
                slides.splice(draggedSlideIndex, 1);
                slides.splice(targetIndex, 0, temp);
                updateSlideNumbers();
                showSlide(targetIndex + 1);
            }
        }
        
        function handleDragEnd(e) {
            draggedSlideIndex = null;
            document.querySelectorAll('.slide-number.dragging').forEach(el => el.classList.remove('dragging'));
        }
        
        function formatPrice(price) {
            return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        }
        
        function getFileName() {
            const managerSelect = document.getElementById('manager');
            const managerName = managerSelect.options[managerSelect.selectedIndex].text.toLowerCase().replace(/\s+/g, '-');
            return `zvuk-b2b-${managerName}-kp`;
        }
        
        async function saveAsPDF() {
            const popup = document.getElementById('pdf-popup');
            const previewWrapper = document.getElementById('previewWrapper');
            popup.style.display = 'flex';
            previewWrapper.classList.add('blurred');

            const fileName = getFileName() + '.pdf';
            const pdf = new jsPDF({
                orientation: 'landscape',
                unit: 'px',
                format: [1920, 1080]
            });

            const tempContainer = document.createElement('div');
            tempContainer.style.cssText = 'position:absolute; left:-9999px; top:0px; width:1920px; height:1080px;';
            document.body.appendChild(tempContainer);
            
            document.body.classList.replace('preview-mode', 'pdf-mode');

            for (let i = 0; i < slides.length; i++) {
                const slideContent = buildSlideHTML(slides[i]);
                tempContainer.innerHTML = '';
                tempContainer.appendChild(slideContent);
                
                const images = tempContainer.querySelectorAll('img');
                const promises = Array.from(images).map(img => {
                    if (!img.complete) {
                        return new Promise(resolve => {
                            img.onload = img.onerror = resolve;
                        });
                    }
                    return Promise.resolve();
                });
                await Promise.all(promises);
                await new Promise(resolve => setTimeout(resolve, 100)); // Доп. задержка

                const canvas = await html2canvas(tempContainer, {
                    scale: 1,
                    useCORS: true,
                    width: 1920,
                    height: 1080,
                    letterRendering: true
                });

                const imgData = canvas.toDataURL('image/jpeg', 0.95);
                if (i > 0) pdf.addPage([1920, 1080], 'landscape');
                pdf.addImage(imgData, 'JPEG', 0, 0, 1920, 1080);
                addLinksToPDF(pdf, tempContainer, i);
            }
            
            document.body.classList.replace('pdf-mode', 'preview-mode');
            document.body.removeChild(tempContainer);
            previewWrapper.classList.remove('blurred');
            popup.style.display = 'none';

            pdf.save(fileName);
        }

        function addLinksToPDF(pdf, slideContent, pageIndex) {
            pdf.setPage(pageIndex + 1);
            
            const addLinkSafe = (element, url) => {
                if (!element || !url) return;
                const rect = element.getBoundingClientRect();
                const parentRect = slideContent.getBoundingClientRect();
                const x = rect.left - parentRect.left;
                const y = rect.top - parentRect.top;
                if (rect.width > 0 && rect.height > 0) {
                    pdf.link(x, y, rect.width, rect.height, { url });
                }
            };
            
            slideContent.querySelectorAll('a').forEach(link => addLinkSafe(link, link.href));

            const slideType = slides[pageIndex].type;
            const fullSlideLinks = {
                 'partner': 'https://zvuk-b2b.com/partners',
                 'premium': 'https://zvuk-b2b.com/premium/',
                 'bprofile': 'https://zvuk-b2b.com/bprofile',
                 'videocontent': 'https://zvuk-b2b.com/video',
                 'videokp': 'https://zvuk-b2b.com/video',
                 'creative': 'https://zvuk-b2b.com/audio_ads'
            };

            if (fullSlideLinks[slideType] && slideType !== 'videokp' && slideType !== 'creative') {
                 pdf.link(0, 0, 1920, 1080, { url: fullSlideLinks[slideType] });
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('select, input:not([type="radio"])');
            inputs.forEach(input => input.addEventListener('input', updateCurrentSlide));
            
            updateSlideNumbers();
            showSlide(1);
            document.querySelector('.menu-header').click();
        });
    </script>
