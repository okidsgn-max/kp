<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор коммерческого предложения</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00b398;
            --primary-hover: #008f79;
            --primary-active: #005c4e;
            --primary-light: #e0f2f0;
            --text-main: #1A1D1F;
            --text-secondary: #3d435c;
            --text-inactive: #667099;
            --border: #e8e8f0;
            --background-light: #f6f6f9;
            --background-dark: #f0f0f5;
            --placeholder: #9A9FA5;
            --sidebar-width: 30vw;
            --preview-width: 70vw;
            --qr-size: 60px;
            --control-icon-size: 30px;
            --scrollbar-thumb: #d1d1d1;
            --scrollbar-track: #f6f6f9;
            --transition-duration: 0.3s;
        }

        /* Общие стили для документа */
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            background-color: var(--background-dark);
            display: flex;
            height: 100vh;
            overflow: hidden;
            flex-wrap: nowrap;
        }

        h1, h2, h3, h4, h5, h6 {
            margin: 0;
            font-weight: 600;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Sidebar и меню */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--background-light);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Стили для скроллбара */
        .sidebar::-webkit-scrollbar {
            width: 8px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background-color: var(--scrollbar-thumb);
            border-radius: 4px;
        }

        .sidebar::-webkit-scrollbar-track {
            background-color: var(--scrollbar-track);
        }

        .menu-top {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
        }

        .menu-logo {
            width: 140px;
        }

        .menu-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            background-color: var(--background-dark);
        }

        .menu-header:hover {
            background-color: #e8e8f0;
        }

        .menu-header h3 {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .menu-header img {
            width: 18px;
            height: 18px;
            transition: transform var(--transition-duration) ease;
        }

        .menu-header.active img {
            transform: rotate(-180deg);
        }

        .menu-content {
            display: none;
            padding: 24px;
            background-color: var(--background-light);
        }

        .menu-content.active {
            display: block;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-inactive);
            margin-bottom: 8px;
        }

        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: #fff;
            color: var(--text-main);
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color var(--transition-duration) ease;
        }

        .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .input-group input::placeholder, .input-group textarea::placeholder {
            color: var(--placeholder);
        }

        .select-group {
            position: relative;
        }

        .select-group::after {
            content: '▼';
            font-size: 12px;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--placeholder);
            pointer-events: none;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }

        .menu-item:hover {
            background-color: #e8e8f0;
        }

        .menu-item.active {
            background-color: var(--primary-light);
        }

        .slide-drag-handle {
            width: 24px;
            height: 24px;
            cursor: grab;
            margin-right: 12px;
        }

        .slide-drag-handle:active {
            cursor: grabbing;
        }

        .slide-info {
            display: flex;
            align-items: center;
            flex-grow: 1;
        }

        .slide-number {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            width: 24px;
            text-align: center;
        }

        .slide-type {
            font-size: 14px;
            color: var(--text-secondary);
            margin-left: 12px;
        }

        .slide-controls {
            display: flex;
            align-items: center;
        }

        .slide-control-icon {
            width: 18px;
            height: 18px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity var(--transition-duration) ease;
        }

        .slide-control-icon:hover {
            opacity: 1;
        }

        .slide-control-icon:not(:last-child) {
            margin-right: 8px;
        }

        .slide-drop-zone {
            padding: 2px 24px;
            height: 0;
            transition: height var(--transition-duration) ease;
            overflow: hidden;
            background-color: #e0f2f0;
            position: relative;
        }

        .slide-drop-zone.active {
            height: 40px;
        }

        .add-slide-btn {
            display: block;
            width: calc(100% - 48px);
            padding: 12px;
            background-color: var(--primary-light);
            color: var(--primary);
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            border-radius: 8px;
            margin: 24px;
            cursor: pointer;
            transition: background-color var(--transition-duration) ease;
        }

        .add-slide-btn:hover {
            background-color: #d1e5e3;
        }

        .action-buttons {
            display: flex;
            justify-content: space-between;
            padding: 24px;
            border-top: 1px solid var(--border);
        }

        .button {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            transition: background-color var(--transition-duration) ease, color var(--transition-duration) ease;
        }

        .primary-button {
            background-color: var(--primary);
            color: #fff;
            width: calc(50% - 6px);
        }

        .primary-button:hover {
            background-color: var(--primary-hover);
        }

        .secondary-button {
            background-color: #fff;
            color: var(--text-main);
            border: 1px solid var(--border);
            width: calc(50% - 6px);
        }

        .secondary-button:hover {
            background-color: var(--background-dark);
        }

        /* Preview Area */
        .preview {
            width: var(--preview-width);
            background-color: var(--background-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .preview-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #fff;
        }

        .preview-slide {
            width: 100%;
            height: 100%;
            position: relative;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            transition: transform var(--transition-duration) ease;
            transform-origin: center center;
            transform: scale(1);
        }
        
        .preview-slide.zoomed {
            transform: scale(2);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            display: block;
        }
        
        .preview-slide.zoomed .slide-content {
            position: absolute;
            left: 0;
            top: 0;
        }
        
        .preview-slide.zoomed .scroll-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .slide-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .zoomed .slide-content {
            position: absolute;
        }

        .slide-content.pdf-print-size {
            width: 1920px;
            height: 1080px;
            position: relative;
            background-color: #fff;
            overflow: hidden;
            transform-origin: top left;
        }
        
        .slide-content.pdf-print-size img {
            max-width: 100%;
            height: auto;
        }

        .controls {
            position: absolute;
            top: 24px;
            right: 24px;
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .control-btn {
            width: var(--control-icon-size);
            height: var(--control-icon-size);
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color var(--transition-duration) ease;
        }

        .control-btn:hover {
            background-color: #fff;
        }

        .control-btn img {
            width: 18px;
            height: 18px;
            opacity: 0.8;
        }

        .slides-container {
            flex-grow: 1;
        }

        .slide-image-placeholder {
            width: 130px;
            height: 130px;
            border-radius: 12px;
            border: 2px dashed var(--placeholder);
            color: var(--placeholder);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            text-align: center;
            box-sizing: border-box;
            cursor: pointer;
        }
        
        .slide-image-placeholder img {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            object-fit: cover;
        }

        /* Styles for price plans */
        .plan-price-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .plan-price-group input {
            width: 100px;
        }
        
        .plan-comment {
            font-size: 12px;
            color: var(--text-inactive);
        }
        
        /* Modal and popup */
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .popup.visible {
            display: flex;
        }
        
        .popup-content {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            width: 300px;
        }
        
        .popup-spinner {
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .popup-content h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .popup-content p {
            font-size: 14px;
            color: var(--text-secondary);
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <div class="menu-top">
                <img class="menu-logo" src="logo.png" alt="Логотип ЗвукБизнес">
            </div>

            <div class="slides-container" id="slides-container">
                </div>

            <div class="add-slide-btn" id="add-slide-btn">Добавить слайд</div>

            <div class="action-buttons">
                <div class="button primary-button" id="savePdfBtn">Сохранить как PDF</div>
                <div class="button secondary-button" id="zoomBtn">
                    <img id="zoom-icon" src="zoom-in.png" alt="Иконка увеличения">
                </div>
            </div>
        </div>

        <div class="preview">
            <div class="preview-container">
                <div class="preview-slide" id="preview-slide">
                    <div class="slide-content" id="slide-content">
                        </div>
                </div>
            </div>
            <div class="controls">
                <div class="control-btn" id="prevSlideBtn">
                    <img src="arrow-left.png" alt="Предыдущий слайд">
                </div>
                <div class="control-btn" id="nextSlideBtn">
                    <img src="arrow-right.png" alt="Следующий слайд">
                </div>
            </div>
        </div>
    </div>
    
    <div id="pdf-popup" class="popup">
        <div class="popup-content">
            <div class="popup-spinner"></div>
            <h3>Сохранение PDF...</h3>
            <p>Пожалуйста, подождите, ваш файл готовится.</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        // Использование IIFE для инкапсуляции кода
        (function() {
            // Использование const и let
            const slideTypes = {
                'title': 'Титульный слайд',
                'description': 'Описание',
                'solution': 'Решение',
                'instruction': 'Инструкция',
                'video': 'Видео',
                'price1': 'Прайс-лист',
                'price2': 'Прайс-лист 2',
                'price3': 'Прайс-лист 3',
                'premium': 'Премиум',
                'videokp': 'Видео КП',
                'manager': 'Контакты менеджеров'
            };

            const slides = [];
            let currentSlideIndex = 0;
            let draggedSlideIndex = null;
            let dropTargetIndex = null;
            let isZoomed = false;

            // DOM-элементы
            const slidesContainer = document.getElementById('slides-container');
            const addSlideBtn = document.getElementById('add-slide-btn');
            const savePdfBtn = document.getElementById('savePdfBtn');
            const prevSlideBtn = document.getElementById('prevSlideBtn');
            const nextSlideBtn = document.getElementById('nextSlideBtn');
            const zoomBtn = document.getElementById('zoomBtn');
            const zoomIcon = document.getElementById('zoom-icon');
            const previewSlide = document.getElementById('preview-slide');
            const slideContent = document.getElementById('slide-content');
            const pdfPopup = document.getElementById('pdf-popup');

            // Вспомогательные функции для создания элементов
            const createElement = (tag, classes = [], content = '') => {
                const el = document.createElement(tag);
                el.classList.add(...classes);
                el.innerHTML = content;
                return el;
            };

            const createInputElement = (type, id, placeholder = '') => {
                const input = createElement('input', ['zvuk-input']);
                input.type = type;
                input.id = id;
                input.placeholder = placeholder;
                return input;
            };

            const createSelectElement = (id, options) => {
                const select = createElement('select', ['zvuk-select']);
                select.id = id;
                options.forEach(option => {
                    const opt = document.createElement('option');
                    opt.value = option.value;
                    opt.textContent = option.text;
                    select.appendChild(opt);
                });
                return select;
            };

            // Функции для управления слайдами
            const updateSlideNumbers = () => {
                const slideItems = document.querySelectorAll('.menu-item');
                slideItems.forEach((item, index) => {
                    item.querySelector('.slide-number').textContent = index + 1;
                });
            };

            const updateCurrentSlide = () => {
                if (currentSlideIndex >= 0 && currentSlideIndex < slides.length) {
                    const currentSlide = slides[currentSlideIndex];
                    const slideData = currentSlide.data;

                    switch (currentSlide.type) {
                        case 'title':
                            slideData.title = document.getElementById('titleText').value;
                            slideData.subtitle = document.getElementById('subtitleText').value;
                            slideData.companyName = document.getElementById('companyName').value;
                            slideData.date = document.getElementById('date').value;
                            break;
                        case 'description':
                            slideData.title = document.getElementById('descriptionTitle').value;
                            slideData.description = document.getElementById('descriptionText').value;
                            break;
                        case 'solution':
                            slideData.title = document.getElementById('solutionTitle').value;
                            slideData.solution = document.getElementById('solutionText').value;
                            break;
                        case 'instruction':
                            slideData.title = document.getElementById('instructionTitle').value;
                            slideData.instruction = document.getElementById('instructionText').value;
                            break;
                        case 'video':
                            slideData.title = document.getElementById('videoTitle').value;
                            slideData.link = document.getElementById('videoLink').value;
                            break;
                        case 'price1':
                            slideData.title = document.getElementById('price1Title').value;
                            slideData.price = document.getElementById('price1Value').value;
                            slideData.comment = document.getElementById('comment').value;
                            break;
                        case 'price2':
                            slideData.title = document.getElementById('price2Title').value;
                            slideData.price1 = document.getElementById('price2Value1').value;
                            slideData.price2 = document.getElementById('price2Value2').value;
                            slideData.comment = document.getElementById('comment').value;
                            break;
                        case 'price3':
                            slideData.title = document.getElementById('price3Title').value;
                            slideData.price1 = document.getElementById('price3Value1').value;
                            slideData.price2 = document.getElementById('price3Value2').value;
                            slideData.price3 = document.getElementById('price3Value3').value;
                            slideData.comment = document.getElementById('comment').value;
                            break;
                        case 'premium':
                            slideData.title = document.getElementById('premiumTitle').value;
                            slideData.price = document.getElementById('premiumPrice').value;
                            slideData.comment = document.getElementById('premiumComment').value;
                            break;
                        case 'videokp':
                            slideData.title = document.getElementById('videokpTitle').value;
                            slideData.price = document.getElementById('videokpPrice').value;
                            slideData.comment = document.getElementById('videokpComment').value;
                            break;
                        case 'manager':
                            slideData.title = document.getElementById('managerTitle').value;
                            break;
                    }
                    showSlide(currentSlideIndex + 1);
                }
            };
            
            const renderSlideContent = (slide) => {
                const data = slide.data;
                const type = slide.type;
                slideContent.innerHTML = '';
                
                // Set background image
                previewSlide.style.backgroundImage = `url(${data.background})`;

                const createTextElement = (tag, text, classes = []) => {
                    const el = createElement(tag, classes);
                    el.textContent = text;
                    return el;
                };

                const createImage = (src, alt, classes = []) => {
                    const img = createElement('img', classes);
                    img.src = src;
                    img.alt = alt;
                    return img;
                };

                const createBannerLink = (src, alt, href) => {
                    const link = createElement('a', ['banner-link']);
                    link.href = href;
                    link.target = '_blank';
                    link.appendChild(createImage(src, alt, ['banner-image']));
                    return link;
                };

                const createPriceBlock = (price, comment) => {
                    const priceDiv = createElement('div', ['price-block']);
                    priceDiv.innerHTML = `<h3>${price} ₽</h3><p>${comment}</p>`;
                    return priceDiv;
                };

                switch (type) {
                    case 'title':
                        slideContent.append(createTextElement('h1', data.title, ['title-text']));
                        slideContent.append(createTextElement('p', data.subtitle, ['subtitle-text']));
                        slideContent.append(createTextElement('div', data.companyName, ['company-name']));
                        slideContent.append(createTextElement('div', data.date, ['date-text']));
                        break;
                    case 'description':
                        slideContent.append(createTextElement('h2', data.title, ['description-title']));
                        slideContent.append(createTextElement('p', data.description, ['description-text']));
                        break;
                    case 'solution':
                        slideContent.append(createTextElement('h2', data.title, ['solution-title']));
                        slideContent.append(createTextElement('p', data.solution, ['solution-text']));
                        break;
                    case 'instruction':
                        slideContent.append(createTextElement('h2', data.title, ['instruction-title']));
                        slideContent.append(createTextElement('p', data.instruction, ['instruction-text']));
                        if (data.banner && data.link) {
                            slideContent.append(createBannerLink(data.banner, 'Баннер для инструкции', data.link));
                        }
                        break;
                    case 'video':
                        slideContent.append(createTextElement('h2', data.title, ['video-title']));
                        slideContent.append(createTextElement('a', data.link, ['video-link']));
                        break;
                    case 'price1':
                        slideContent.append(createTextElement('h2', data.title, ['price-title']));
                        slideContent.append(createPriceBlock(data.price, data.comment));
                        break;
                    case 'price2':
                        slideContent.append(createTextElement('h2', data.title, ['price-title']));
                        slideContent.append(createPriceBlock(data.price1, 'Первый вариант'));
                        slideContent.append(createPriceBlock(data.price2, 'Второй вариант'));
                        break;
                    case 'price3':
                        slideContent.append(createTextElement('h2', data.title, ['price-title']));
                        slideContent.append(createPriceBlock(data.price1, 'Первый вариант'));
                        slideContent.append(createPriceBlock(data.price2, 'Второй вариант'));
                        slideContent.append(createPriceBlock(data.price3, 'Третий вариант'));
                        break;
                    case 'premium':
                        slideContent.append(createTextElement('h2', data.title, ['premium-title']));
                        slideContent.append(createPriceBlock(data.price, data.comment));
                        break;
                    case 'videokp':
                        slideContent.append(createTextElement('h2', data.title, ['videokp-title']));
                        slideContent.append(createPriceBlock(data.price, data.comment));
                        break;
                    case 'manager':
                        slideContent.append(createTextElement('h2', data.title, ['manager-title']));
                        data.managers.forEach(manager => {
                            const managerDiv = createElement('div', ['manager-block']);
                            const managerLink = createElement('a', ['manager-link']);
                            managerLink.href = manager.link;
                            managerLink.target = '_blank';
                            managerLink.appendChild(createImage(manager.image, `Менеджер: ${manager.name}`, ['manager-photo']));
                            managerDiv.appendChild(managerLink);
                            managerDiv.appendChild(createTextElement('p', manager.name, ['manager-name']));
                            managerDiv.appendChild(createTextElement('p', manager.phone, ['manager-phone']));
                            slideContent.append(managerDiv);
                        });
                        break;
                }
            };
            
            const createSettingsPanel = (slide) => {
                const settingsPanel = document.createElement('div');
                settingsPanel.classList.add('menu-content');
                settingsPanel.id = `settings-${slide.id}`;

                const createInputGroup = (label, inputElement) => {
                    const group = createElement('div', ['input-group']);
                    const labelEl = createElement('label', [], label);
                    group.appendChild(labelEl);
                    group.appendChild(inputElement);
                    return group;
                };

                switch (slide.type) {
                    case 'title':
                        settingsPanel.appendChild(createInputGroup('Заголовок', createInputElement('text', 'titleText', 'Коммерческое предложение')));
                        settingsPanel.appendChild(createInputGroup('Подзаголовок', createInputElement('text', 'subtitleText', 'Решение для вашего бизнеса')));
                        settingsPanel.appendChild(createInputGroup('Название компании', createInputElement('text', 'companyName', 'Название компании')));
                        settingsPanel.appendChild(createInputGroup('Дата', createInputElement('text', 'date', '01.01.2024')));
                        break;
                    case 'description':
                        settingsPanel.appendChild(createInputGroup('Заголовок', createInputElement('text', 'descriptionTitle', 'Описание')));
                        settingsPanel.appendChild(createInputGroup('Текст описания', createElement('textarea', [], 'Текст описания...')));
                        break;
                    case 'solution':
                        settingsPanel.appendChild(createInputGroup('Заголовок', createInputElement('text', 'solutionTitle', 'Решение')));
                        settingsPanel.appendChild(createInputGroup('Текст решения', createElement('textarea', [], 'Текст решения...')));
                        break;
                    case 'instruction':
                        settingsPanel.appendChild(createInputGroup('Заголовок', createInputElement('text', 'instructionTitle', 'Инструкция')));
                        settingsPanel.appendChild(createInputGroup('Текст инструкции', createElement('textarea', [], 'Текст инструкции...')));
                        break;
                    case 'video':
                        settingsPanel.appendChild(createInputGroup('Заголовок', createInputElement('text', 'videoTitle', 'Видео')));
                        settingsPanel.appendChild(createInputGroup('Ссылка на видео', createInputElement('text', 'videoLink', 'https://example.com/video')));
                        break;
                    case 'price1':
                        settingsPanel.appendChild(createInputGroup('Заголовок', createInputElement('text', 'price1Title', 'Прайс-лист')));
                        settingsPanel.appendChild(createInputGroup('Цена', createInputElement('text', 'price1Value', '10 000 ₽')));
                        settingsPanel.appendChild(createInputGroup('Комментарий', createElement('textarea', [], 'Текст комментария...')));
                        break;
                    case 'price2':
                        settingsPanel.appendChild(createInputGroup('Заголовок', createInputElement('text', 'price2Title', 'Прайс-лист')));
                        settingsPanel.appendChild(createInputGroup('Цена 1', createInputElement('text', 'price2Value1', '5 000 ₽')));
                        settingsPanel.appendChild(createInputGroup('Цена 2', createInputElement('text', 'price2Value2', '15 000 ₽')));
                        settingsPanel.appendChild(createInputGroup('Комментарий', createElement('textarea', [], 'Текст комментария...')));
                        break;
                    case 'price3':
                        settingsPanel.appendChild(createInputGroup('Заголовок', createInputElement('text', 'price3Title', 'Прайс-лист')));
                        settingsPanel.appendChild(createInputGroup('Цена 1', createInputElement('text', 'price3Value1', '5 000 ₽')));
                        settingsPanel.appendChild(createInputGroup('Цена 2', createInputElement('text', 'price3Value2', '10 000 ₽')));
                        settingsPanel.appendChild(createInputGroup('Цена 3', createInputElement('text', 'price3Value3', '15 000 ₽')));
                        settingsPanel.appendChild(createInputGroup('Комментарий', createElement('textarea', [], 'Текст комментария...')));
                        break;
                    case 'premium':
                        settingsPanel.appendChild(createInputGroup('Заголовок', createInputElement('text', 'premiumTitle', 'Премиум')));
                        settingsPanel.appendChild(createInputGroup('Цена', createInputElement('text', 'premiumPrice', '20 000 ₽')));
                        settingsPanel.appendChild(createInputGroup('Комментарий', createElement('textarea', [], 'Текст комментария...')));
                        break;
                    case 'videokp':
                        settingsPanel.appendChild(createInputGroup('Заголовок', createInputElement('text', 'videokpTitle', 'Видео КП')));
                        settingsPanel.appendChild(createInputGroup('Цена', createInputElement('text', 'videokpPrice', '50 000 ₽')));
                        settingsPanel.appendChild(createInputGroup('Комментарий', createElement('textarea', [], 'Текст комментария...')));
                        break;
                    case 'manager':
                        settingsPanel.appendChild(createInputGroup('Заголовок', createInputElement('text', 'managerTitle', 'Контакты')));
                        break;
                }
                return settingsPanel;
            };

            const addSlide = (type, data = {}) => {
                const newSlide = {
                    id: Date.now(),
                    type: type,
                    data: { ...data }
                };
                slides.push(newSlide);
                renderSidebarItem(newSlide);
                updateSlideNumbers();
                showSlide(slides.length);
            };

            const renderSidebarItem = (slide) => {
                const item = createElement('div', ['menu-item']);
                item.setAttribute('data-id', slide.id);
                item.setAttribute('draggable', true);

                const dragHandle = createElement('img', ['slide-drag-handle']);
                dragHandle.src = 'drag.png';
                dragHandle.alt = 'Перетаскивание';

                const slideInfo = createElement('div', ['slide-info']);
                const slideNumber = createElement('span', ['slide-number']);
                const slideType = createElement('span', ['slide-type']);
                slideType.textContent = slideTypes[slide.type] || 'Слайд';
                slideInfo.append(slideNumber, slideType);

                const slideControls = createElement('div', ['slide-controls']);
                const deleteIcon = createElement('img', ['slide-control-icon']);
                deleteIcon.src = 'delete.png';
                deleteIcon.alt = 'Удалить';
                deleteIcon.onclick = (e) => {
                    e.stopPropagation();
                    const index = slides.findIndex(s => s.id === slide.id);
                    if (index > -1) {
                        slides.splice(index, 1);
                        item.remove();
                        document.getElementById(`settings-${slide.id}`).remove();
                        updateSlideNumbers();
                        if (slides.length > 0) {
                            showSlide(Math.min(currentSlideIndex, slides.length));
                        } else {
                            slideContent.innerHTML = '';
                            previewSlide.style.backgroundImage = 'none';
                        }
                    }
                };
                slideControls.appendChild(deleteIcon);
                
                item.append(dragHandle, slideInfo, slideControls);
                
                item.onclick = () => showSlide(slides.indexOf(slide) + 1);
                
                const settingsPanel = createSettingsPanel(slide);
                
                const dropZone = createElement('div', ['slide-drop-zone']);
                
                slidesContainer.append(item, settingsPanel, dropZone);
            };
            
            const showSlide = (index) => {
                if (index < 1 || index > slides.length) return;

                const allMenuItems = document.querySelectorAll('.menu-item');
                allMenuItems.forEach(item => item.classList.remove('active'));
                
                const allSettings = document.querySelectorAll('.menu-content');
                allSettings.forEach(panel => {
                    if (panel.style.display !== 'none') {
                        panel.style.display = 'none';
                    }
                });

                currentSlideIndex = index - 1;
                const currentSlide = slides[currentSlideIndex];

                const currentMenuItem = document.querySelector(`.menu-item[data-id="${currentSlide.id}"]`);
                if (currentMenuItem) {
                    currentMenuItem.classList.add('active');
                    const settingsPanel = document.getElementById(`settings-${currentSlide.id}`);
                    settingsPanel.style.display = 'block';
                }

                renderSlideContent(currentSlide);
                updateListeners();
            };

            const updateListeners = () => {
                // Clear old listeners by re-rendering or detaching
                const oldInputs = document.querySelectorAll('#settings-panel input, #settings-panel textarea');
                oldInputs.forEach(input => input.removeEventListener('input', updateCurrentSlide));

                const currentSlide = slides[currentSlideIndex];
                if (!currentSlide) return;

                const settingsPanel = document.getElementById(`settings-${currentSlide.id}`);
                const inputs = settingsPanel.querySelectorAll('input, textarea');
                inputs.forEach(input => input.addEventListener('input', updateCurrentSlide));
            };

            const saveAsPDF = async () => {
                if (slides.length === 0) {
                    alert('Добавьте хотя бы один слайд.');
                    return;
                }

                pdfPopup.classList.add('visible');

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({
                    orientation: 'landscape',
                    unit: 'px',
                    format: [1920, 1080]
                });

                const originalWidth = slideContent.offsetWidth;
                const originalHeight = slideContent.offsetHeight;

                slideContent.classList.add('pdf-print-size');
                previewSlide.style.height = '1080px';
                previewSlide.style.width = '1920px';
                previewSlide.style.position = 'absolute';
                previewSlide.style.top = '0';
                previewSlide.style.left = '0';
                
                try {
                    for (let i = 0; i < slides.length; i++) {
                        currentSlideIndex = i;
                        await showSlide(i + 1);
                        await new Promise(resolve => setTimeout(resolve, 100)); // Wait for render

                        const canvas = await html2canvas(slideContent, { scale: 1, useCORS: true });
                        const imgData = canvas.toDataURL('image/jpeg', 1.0);
                        doc.addImage(imgData, 'JPEG', 0, 0, 1920, 1080);

                        // Add links to PDF
                        const links = slideContent.querySelectorAll('a');
                        links.forEach(link => {
                            if (link.href) {
                                const rect = link.getBoundingClientRect();
                                const x = rect.left;
                                const y = rect.top;
                                const width = rect.width;
                                const height = rect.height;
                                doc.link(x, y, width, height, { url: link.href });
                            }
                        });

                        if (i < slides.length - 1) {
                            doc.addPage();
                        }
                    }
                    doc.save("КП_ЗвукБизнес.pdf");
                } catch (error) {
                    console.error("Ошибка при генерации PDF:", error);
                    alert("Произошла ошибка при сохранении PDF.");
                } finally {
                    // Reset styles
                    slideContent.classList.remove('pdf-print-size');
                    previewSlide.style.height = '';
                    previewSlide.style.width = '';
                    previewSlide.style.position = '';
                    previewSlide.style.top = '';
                    previewSlide.style.left = '';
                    pdfPopup.classList.remove('visible');
                    showSlide(currentSlideIndex + 1);
                }
            };
            
            // Drag and drop logic
            const handleDragStart = (e) => {
                draggedSlideIndex = Array.from(slidesContainer.children).indexOf(e.target) / 3;
                e.dataTransfer.effectAllowed = 'move';
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                const target = e.target.closest('.menu-item');
                if (target) {
                    const targetIndex = Array.from(slidesContainer.children).indexOf(target) / 3;
                    if (targetIndex !== draggedSlideIndex) {
                        const dropZones = document.querySelectorAll('.slide-drop-zone');
                        dropZones.forEach(dz => dz.classList.remove('active'));
                        
                        const dropZone = document.getElementById('slides-container').children[targetIndex * 3 + 2];
                        if (dropZone) {
                            dropZone.classList.add('active');
                            dropTargetIndex = targetIndex;
                        }
                    }
                }
            };

            const handleDragEnter = (e) => {
                e.preventDefault();
            };

            const handleDragLeave = (e) => {
                const dropZone = e.target.closest('.slide-drop-zone');
                if (dropZone) {
                    dropZone.classList.remove('active');
                }
            };
            
            const handleDrop = (e) => {
                e.preventDefault();
                const dropZones = document.querySelectorAll('.slide-drop-zone');
                dropZones.forEach(dz => dz.classList.remove('active'));

                if (draggedSlideIndex !== null && dropTargetIndex !== null && draggedSlideIndex !== dropTargetIndex) {
                    const [draggedSlide] = slides.splice(draggedSlideIndex, 1);
                    slides.splice(dropTargetIndex, 0, draggedSlide);
                    
                    const draggedItem = document.querySelector(`.menu-item[data-id="${draggedSlide.id}"]`);
                    const draggedSettings = document.getElementById(`settings-${draggedSlide.id}`);
                    const draggedDropZone = draggedItem.nextElementSibling.nextElementSibling;

                    const dropTargetItem = document.getElementById('slides-container').children[dropTargetIndex * 3];

                    slidesContainer.insertBefore(draggedItem, dropTargetItem);
                    slidesContainer.insertBefore(draggedSettings, draggedItem.nextElementSibling);
                    slidesContainer.insertBefore(draggedDropZone, draggedSettings.nextElementSibling);
                    
                    updateSlideNumbers();
                    showSlide(dropTargetIndex + 1);
                }
                draggedSlideIndex = null;
                dropTargetIndex = null;
            };

            const handleDragEnd = () => {
                const dropZones = document.querySelectorAll('.slide-drop-zone');
                dropZones.forEach(dz => dz.classList.remove('active'));
                draggedSlideIndex = null;
                dropTargetIndex = null;
            };

            // Event listeners
            addSlideBtn.addEventListener('click', () => {
                const type = prompt("Введите тип слайда:\n(title, description, solution, instruction, video, price1, price2, price3, premium, videokp, manager)");
                if (type && slideTypes[type]) {
                    addSlide(type, {
                        background: `bg-${type}.png`,
                        title: '',
                        subtitle: '',
                        description: '',
                        solution: '',
                        instruction: '',
                        link: '',
                        price: '',
                        comment: '',
                        managers: [
                            { name: 'Имя Менеджера 1', phone: '+7 999 123-45-67', image: 'manager1.png', link: 'https://wa.me/79991234567' },
                            { name: 'Имя Менеджера 2', phone: '+7 999 765-43-21', image: 'manager2.png', link: 'https://wa.me/79997654321' }
                        ]
                    });
                } else if (type) {
                    alert('Неизвестный тип слайда.');
                }
            });

            savePdfBtn.addEventListener('click', saveAsPDF);
            prevSlideBtn.addEventListener('click', () => showSlide(currentSlideIndex));
            nextSlideBtn.addEventListener('click', () => showSlide(currentSlideIndex + 2));

            zoomBtn.addEventListener('click', () => {
                isZoomed = !isZoomed;
                previewSlide.classList.toggle('zoomed', isZoomed);
                zoomIcon.src = isZoomed ? 'zoom-out.png' : 'zoom-in.png';
            });
            
            // Drag & drop event listeners
            slidesContainer.addEventListener('dragstart', handleDragStart, false);
            slidesContainer.addEventListener('dragover', handleDragOver, false);
            slidesContainer.addEventListener('dragenter', handleDragEnter, false);
            slidesContainer.addEventListener('dragleave', handleDragLeave, false);
            slidesContainer.addEventListener('drop', handleDrop, false);
            slidesContainer.addEventListener('dragend', handleDragEnd, false);

            // Initial setup
            document.addEventListener('DOMContentLoaded', () => {
                // Initial slides data (example)
                addSlide('title', {
                    background: 'bg-title.png',
                    title: 'Коммерческое предложение',
                    subtitle: 'Решение для вашего бизнеса',
                    companyName: 'ЗвукБизнес',
                    date: new Date().toLocaleDateString('ru-RU')
                });
                addSlide('manager', {
                    background: 'bg-manager.png',
                    title: 'Контакты менеджеров',
                    managers: [
                        { name: 'Иван Иванов', phone: '+7 999 123-45-67', image: 'manager1.png', link: 'https://wa.me/79991234567' },
                        { name: 'Мария Петрова', phone: '+7 999 765-43-21', image: 'manager2.png', link: 'https://wa.me/79997654321' }
                    ]
                });
                
                showSlide(1);
            });

        })();
    </script>
