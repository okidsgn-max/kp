<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор коммерческого предложения</title>
    <style>
        /* Базовые переменные и стили, без изменений */
        :root {
            --button-color: #00b398;
            --button-hover: #008f79;
            --button-text: white;
            --text-color: #667099;
            --active-color: #008f79;
            --input-bg: #f6f6f9;
            --input-border: hsl(228, 20%, 97%);
            --sidebar-width: 30vw;
            --preview-width: 70vw;
            --qr-size: 60px;
            --control-icon-size: 30px;
        }

        body {
            font-family: 'SB Sans', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            background-color: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .menu-container {
            width: var(--sidebar-width);
            background-color: white;
            padding: 20px;
            height: 100%;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .menu-header-container {
            display: flex;
            flex-direction: column;
            margin-bottom: 30px;
        }

        .menu-logo {
            height: 24px;
            width: auto;
            object-fit: contain;
            align-self: flex-start;
            margin-bottom: 16px;
        }

        .menu-title {
            color: #3d435c;
            font-weight: 600;
            font-size: 24px;
            font-family: 'SBSansText', sans-serif;
        }

        .menu-sections {
            flex-grow: 1;
            overflow-y: auto;
        }

        .menu-section-header {
            color: #3d435c;
            font-weight: 600;
            font-size: 16px;
        }

        .menu-section-header.active {
            color: var(--active-color);
        }

        .menu-label {
            color: #667099;
            font-weight: 600;
            font-size: 16px;
            display: block;
            margin-bottom: 8px;
        }

        .preview-container {
            width: var(--preview-width);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow: hidden;
            position: relative;
            background-color: #f8f8f8;
        }

        .preview-wrapper {
            position: relative;
            margin-bottom: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            height: 90%;
        }

        .preview-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
        }

        .delete-slide-btn {
            background-color: transparent;
            border: none;
            cursor: pointer;
            width: 24px;
            height: 24px;
            padding: 0;
        }

        .delete-slide-btn img {
            width: 100%;
            height: 100%;
        }

        .slide-controls-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            width: 100%;
        }

        .slide-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
        }

        #slideNumbers {
            display: flex;
            gap: 8px;
        }

        .control-icon {
            width: var(--control-icon-size);
            height: var(--control-icon-size);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .control-icon img {
            width: 24px;
            height: 24px;
        }

        .slide-number {
            width: var(--control-icon-size);
            height: var(--control-icon-size);
            border-radius: 50%;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 500;
            color: #3d435c;
            user-select: none;
            transition: transform 0.3s ease;
        }

        .slide-number.active {
            background-color: var(--button-color);
            color: white;
        }

        .slide-number.dragging {
            opacity: 0.5;
            transform: scale(1.2);
        }

        .slide-number.drop-target {
            transform: scale(1.1);
            background-color: var(--button-hover);
            color: white;
        }

        .preview-page {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            transform-origin: center center;
            cursor: pointer;
        }

        .preview-page.zoomed {
            transform: scale(1.4);
            z-index: 100;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.4);
            max-width: 70vw;
            max-height: 70vh;
        }
        
        .preview-bg {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }
        
        .preview-banner {
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            width: 100%;
            object-fit: fill;
        }
        
        .preview-logos {
            position: absolute;
            bottom: 6%;
            left: 2%;
            width: 50%;
            max-height: 15%;
            object-fit: contain;
        }
        
        /* Стили для элементов, которые должны масштабироваться для PDF */
        /* Размеры для превью */
        .preview-price {
            position: absolute;
            top: 63%;
            left: 3%;
            color: white;
            font-size: 24px;
            font-weight: bold;
            width: 80%;
        }
        
        .preview-comment {
            position: absolute;
            top: 69%;
            left: 3%;
            color: #D9D9D9;
            font-size: 20px;
            width: 80%;
            font-weight: 500;
        }
        
        .price-table {
            position: absolute;
            top: 55%;
            left: 3%;
            width: 60%;
            color: white;
            font-size: 20px;
            border-collapse: collapse;
        }
        
        .price-table th, .price-table td {
            padding: 10px;
            text-align: left;
            border: 1px solid #303030;
        }
        
        .price-table th {
            background-color: rgba(0,0,0,0.3);
        }
        
        .preview-manager {
            position: absolute;
            bottom: 8%;
            left: 0%;
            width: 100%;
            object-fit: contain;
        }
        
        .preview-phone {
            position: absolute;
            bottom: 13.5%;
            left: 11.5%;
            color: white;
            font-size: 20px;
            font-weight: 600;
        }
        
        .preview-qr {
            position: absolute;
            bottom: 8%;
            right: 39%;
            width: var(--qr-size);
            height: var(--qr-size);
            background-color: white;
            border-radius: 8px;
            padding:7px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .preview-qr img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .preview-link {
            position: absolute;
            bottom: 5%;
            right: 5%;
            color: transparent; 
        }

        /* Добавление класса-обертки для ссылок-картинок */
        .preview-video {
            position: absolute;
            bottom: 0%;
            left: 35%;
            width: 100px;
            height: 100px;
        }

        .preview-video img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .menu-section {
            margin-bottom: 8px;
            border-bottom: 1px solid #eee;
            padding-bottom: 2px;
        }
        
        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .menu-content {
            display: none;
            padding-left: 0px;
        }
        
        .menu-content.active {
            display: block;
        }
        
        .toggle-button {
            font-size: 26px;
            color: #3d435c;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid var(--input-border);
            background-color: var(--input-bg);
            border-radius: 8px;
            color: var(--text-color);
            font-weight: 500;
            font-size: 16px;
            font-family: 'SB Sans', sans-serif;
        }
        
        input[type="number"] {
            -moz-appearance: textfield;
        }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: var(--button-color);
        }
        
        .radio-group {
            margin-bottom: 15px;
        }
        
        .radio-option {
            margin-bottom: 0px;
            display: flex;
            align-items: baseline;
        }
        
        .radio-option input {
            width: auto;
            margin-right: 4px;
        }
        
        .radio-option label {
            color: var(--text-color);
            font-weight: 500;
            font-size: 16px;
        }
        
        .price-columns {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .price-column {
            flex: 1;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top:20px;
            position: sticky;
            bottom: 40px;
            background: white;
            z-index: 10;
        }
        
        button {
            padding: 12px 12px;
            background-color: var(--button-color);
            color: var(--button-text);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'SB Sans', sans-serif;
            font-size: 16px;
            font-weight: 500;
            transition: background-color 0.3s;
            flex: 1;
        }
        
        button:hover {
            background-color: var(--button-hover);
        }
        
        .add-slide-btn {
            background-color: var(--button-color);
            color: white;
            margin-top: 10px;
        }
        
        .remove-slide-btn {
            background-color: #7F7F7F;
            color: white;
            margin-top: 10px;
        }
        
        .hidden {
            display: none;
        }
        
        .phone-type {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .phone-type label {
            display: flex;
            align-items: baseline;
            gap: 5px;
            color: var(--text-color);
            font-weight: 500;
            font-size: 16px;
        }

        .instruction-text {
            position: absolute;
            top: 40%;
            left: 3%;
            color: white;
            font-size: 18px;
            font-weight: 500;
            width: 40%;
            line-height: 1.6;
        }

        .instruction-text a {
            color: var(--button-color);
            text-decoration: none;
            font-weight: 500;
        }

        /* --- НОВЫЕ СТИЛИ для PDF адаптации и попапа --- */
        /* Класс, который будет добавляться к .preview-page перед сохранением PDF */
        .pdf-export-size .preview-price {
            font-size: 32px; /* Увеличиваем размер для PDF */
        }
        .pdf-export-size .preview-comment {
            font-size: 26px; /* Увеличиваем размер для PDF */
        }
        .pdf-export-size .price-table {
            font-size: 26px; /* Увеличиваем размер для PDF */
        }
        .pdf-export-size .preview-phone {
            font-size: 26px; /* Увеличиваем размер для PDF */
        }
        .pdf-export-size .instruction-text {
            font-size: 24px; /* Увеличиваем размер для PDF */
        }
        .pdf-export-size .preview-video {
            width: 150px;
            height: 150px;
        }
        .pdf-export-size .preview-qr {
            width: 80px;
            height: 80px;
        }
        
        /* Стили для попапа сохранения PDF */
        #pdf-popup {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            font-family: 'SB Sans', sans-serif;
            color: white;
            font-size: 24px;
        }
        
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow: auto;
                height: auto;
            }

            .menu-container {
                width: 100vw;
                height: 45vh;
                box-shadow: none;
                padding: 10px;
                overflow-y: auto;
            }

            .preview-container {
                width: 100vw;
                height: 55vh;
                padding: 0;
                overflow: hidden;
            }

            .preview-wrapper {
                height: 100%;
            }

            .preview-page {
                height: 100% !important;
                width: 100% !important;
                max-width: 100%;
                max-height: 100%;
            }

            .preview-page.zoomed {
                position: absolute;
                top: 0;
                left: 0;
                transform: scale(1.2);
                width: 100%;
                height: 100%;
            }

            .action-buttons {
                position: fixed;
                bottom: 10px;
                left: 10px;
                right: 10px;
                flex-direction: row;
                gap: 10px;
                background: transparent;
                padding: 10px;
                border-radius: 8px;
                z-index: 100;
            }
        }
        /* Специальные стили для Safari */
        @media not all and (min-resolution:.001dpcm) { 
            @supports (-webkit-appearance:none) {
                .menu-container {
                    height: 45vh;
                    overflow-y: scroll;
                    -webkit-overflow-scrolling: touch;
                }
                .preview-container {
                    height: 55vh;
                }
            }
        }

        /* Стили для Firefox */
        @-moz-document url-prefix() {
            .menu-container {
                scrollbar-width: thin;
            }
        }
    </style>
</head>

                    <label class="menu-label">Стоимость, ₽/мес:</label>
                    <input type="number" id="videokpPrice" value="45000">
                    <label class="menu-label">Комментарий:</label>
                    <input type="text" id="videokpComment" placeholder="Введите комментарий">
                    <button class="add-slide-btn" onclick="addSlide('videokp')">Добавить слайд</button>
                    <button class="remove-slide-btn" onclick="removeSlide('videokp')">Удалить слайд</button>
                </div>
            </div>
            <div class="menu-section">
                <div class="menu-header" onclick="toggleMenu(this, 'sberzvuk')">
                    <span class="menu-section-header">9. Баннер сберзвук</span>
                    <span class="toggle-button">+</span>
                </div>
                <div class="menu-content">
                    <button class="add-slide-btn" onclick="addSlide('sberzvuk')">Добавить слайд</button>
                    <button class="remove-slide-btn" onclick="removeSlide('sberzvuk')">Удалить слайд</button>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button onclick="saveToPdf()">Сохранить в PDF</button>
        </div>
    </div>
    
    <div class="preview-container">
        <div class="preview-wrapper" id="previewWrapper">
            <!-- Здесь будут отображаться слайды -->
        </div>
        <div class="slide-controls-container">
            <div class="slide-controls">
                <div class="control-icon" onclick="prevSlide()"><img src="images/prev.svg" alt="Previous Slide"></div>
                <div id="slideNumbers"></div>
                <div class="control-icon" onclick="nextSlide()"><img src="images/next.svg" alt="Next Slide"></div>
            </div>
        </div>
    </div>
    
    <!-- Попап для сохранения PDF -->
    <div id="pdf-popup">
        <p>Пожалуйста, подождите, ваш PDF сохраняется...</p>
    </div>

    <!-- Скрипты -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // Исходные данные для генерации слайдов и ссылок менеджеров
        const slideTemplates = {
            general: {
                html: `
                    <img class="preview-bg" src="images/general.png" alt="General Slide">
                    <img class="preview-banner" src="" id="previewBanner" alt="Banner">
                    <img class="preview-logos" src="" id="previewLogos" alt="Logos">
                `
            },
            pricing: {
                html: `
                    <img class="preview-bg" src="images/pricing.png" alt="Pricing Slide">
                    <img class="preview-manager" src="" id="previewManager" alt="Manager">
                    <a href="" target="_blank" class="preview-link" id="managerLink"></a>
                    <div class="preview-phone" id="previewPhone"></div>
                    <div class="preview-qr" id="previewQrCode"></div>
                    <div class="preview-price" id="previewPrice"></div>
                    <div class="preview-comment" id="previewComment"></div>
                    <table class="price-table" id="priceTable">
                        <thead>
                            <tr>
                                <th>1-3 точки</th>
                                <th>4-9 точек</th>
                                <th>10+ точек</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td id="price3_1"></td>
                                <td id="price3_2"></td>
                                <td id="price3_3"></td>
                            </tr>
                        </tbody>
                    </table>
                    <img class="preview-banner" src="" id="previewPriceBanner" alt="Price Banner">
                `
            },
            instruction: {
                html: `
                    <img class="preview-bg" src="images/instruction.png" alt="Instruction Slide">
                    <div class="instruction-text" id="instructionText">
                        С подробной инструкцией по подключению можно ознакомиться по <a href="https://zvuk-b2b.com/" target="_blank">ссылке</a>
                    </div>
                `
            },
            app: {
                html: `
                    <img class="preview-bg" src="images/app.png" alt="App Slide">
                    <a href="https://apps.apple.com/ru/app/zvuk-b2b/id1454625298" target="_blank" class="preview-video"><img src="coffeoneprice.png" alt="coffeoneprice"></a>
                `
            },
            creative: {
                html: `
                    <img class="preview-bg" src="images/creative.png" alt="Creative Slide">
                    <a href="https://zvuk-b2b.com/prices/audio_creative" target="_blank" class="preview-video"><img src="letual.png" alt="letual"></a>
                `
            },
            playlist: {
                html: `
                    <img class="preview-bg" src="images/playlist.png" alt="Playlist Slide">
                    <img class="preview-banner" src="" id="previewPlaylist" alt="Playlist Banner">
                `
            },
            premium: {
                html: `
                    <img class="preview-bg" src="images/premium.png" alt="Premium Slide">
                    <div class="preview-price" id="previewPremiumPrice"></div>
                    <div class="preview-comment" id="previewPremiumComment"></div>
                `
            },
            videokp: {
                html: `
                    <img class="preview-bg" src="images/videokp.png" alt="Videokp Slide">
                    <div class="preview-price" id="previewVideokpPrice"></div>
                    <div class="preview-comment" id="previewVideokpComment"></div>
                `
            },
            sberzvuk: {
                html: `
                    <img class="preview-bg" src="images/sberzvuk.png" alt="Sberzvuk Slide">
                `
            }
        };

        const managerLinks = {
            mankova: {
                image: 'images/mankova.png',
                link: 'https://app.zvuk-b2b.com/register?promocode=mankova'
            },
            ivanova: {
                image: 'images/ivanova.png',
                link: 'https://app.zvuk-b2b.com/register?promocode=ivanova'
            },
            temur: {
                image: 'images/temur.png',
                link: 'https://app.zvuk-b2b.com/register?promocode=temur'
            },
            german: {
                image: 'images/german.png',
                link: 'https://app.zvuk-b2b.com/register?promocode=german'
            },
            hlebnikova: {
                image: 'images/hlebnikova.png',
                link: 'https://app.zvuk-b2b.com/register?promocode=hlebnikova'
            },
            zemciova: {
                image: 'images/zemciova.png',
                link: 'https://app.zvuk-b2b.com/register?promocode=zemciova'
            },
            nikulina: {
                image: 'images/nikulina.png',
                link: 'https://app.zvuk-b2b.com/register?promocode=nikulina'
            }
        };

        const slides = [];
        let currentSlideIndex = 0;
        let isZoomed = false;

        function toggleMenu(header, sectionName) {
            const content = header.nextElementSibling;
            const button = header.querySelector('.toggle-button');
            const isActive = content.classList.toggle('active');
            button.textContent = isActive ? '—' : '+';
        }

        function addSlide(type) {
            const newSlide = { type: type, data: {} };
            slides.push(newSlide);
            renderSlides();
            updateSlideNumbers();
            showSlide(slides.length - 1);
            updateCurrentSlide();
        }
        
        function removeSlide(type) {
            const indexToRemove = slides.findIndex(slide => slide.type === type);
            if (indexToRemove !== -1) {
                slides.splice(indexToRemove, 1);
                renderSlides();
                updateSlideNumbers();
                if (slides.length > 0) {
                    currentSlideIndex = Math.min(currentSlideIndex, slides.length - 1);
                    showSlide(currentSlideIndex);
                } else {
                    currentSlideIndex = -1;
                    document.getElementById('previewWrapper').innerHTML = '';
                }
            }
        }

        function renderSlides() {
            const wrapper = document.getElementById('previewWrapper');
            wrapper.innerHTML = '';
            slides.forEach((slide, index) => {
                const slideElement = document.createElement('div');
                slideElement.className = 'preview-page';
                slideElement.innerHTML = slideTemplates[slide.type].html;
                slideElement.dataset.index = index;
                slideElement.onclick = (event) => {
                    if (event.target.tagName !== 'A' && event.target.tagName !== 'BUTTON') {
                        toggleZoom(slideElement);
                    }
                };
                wrapper.appendChild(slideElement);
            });
            showSlide(currentSlideIndex);
        }

        function updateSlideNumbers() {
            const slideNumbersContainer = document.getElementById('slideNumbers');
            slideNumbersContainer.innerHTML = '';
            slides.forEach((_, index) => {
                const numberDiv = document.createElement('div');
                numberDiv.className = 'slide-number';
                numberDiv.textContent = index + 1;
                numberDiv.dataset.index = index;
                numberDiv.onclick = () => showSlide(index);
                
                // Добавляем логику drag-and-drop
                numberDiv.draggable = true;
                numberDiv.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', index);
                    numberDiv.classList.add('dragging');
                });
                numberDiv.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    numberDiv.classList.add('drop-target');
                });
                numberDiv.addEventListener('dragleave', () => {
                    numberDiv.classList.remove('drop-target');
                });
                numberDiv.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const draggedIndex = parseInt(e.dataTransfer.getData('text/plain'));
                    const droppedIndex = parseInt(numberDiv.dataset.index);
                    if (draggedIndex !== droppedIndex) {
                        const [draggedSlide] = slides.splice(draggedIndex, 1);
                        slides.splice(droppedIndex, 0, draggedSlide);
                        currentSlideIndex = droppedIndex;
                        renderSlides();
                        updateSlideNumbers();
                    }
                    numberDiv.classList.remove('drop-target');
                });
                numberDiv.addEventListener('dragend', () => {
                    numberDiv.classList.remove('dragging');
                    document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
                });
                
                slideNumbersContainer.appendChild(numberDiv);
            });
            if (slides.length > 0) {
                slideNumbersContainer.children[currentSlideIndex].classList.add('active');
            }
        }
        
        function showSlide(index) {
            const allSlides = document.querySelectorAll('.preview-page');
            allSlides.forEach((slide, i) => {
                slide.style.display = i === index ? 'block' : 'none';
            });
            const slideNumbers = document.querySelectorAll('.slide-number');
            slideNumbers.forEach((num, i) => {
                num.classList.toggle('active', i === index);
            });
            currentSlideIndex = index;
            updateCurrentSlide();
        }

        function nextSlide() {
            if (slides.length > 0) {
                currentSlideIndex = (currentSlideIndex + 1) % slides.length;
                showSlide(currentSlideIndex);
            }
        }
        
        function prevSlide() {
            if (slides.length > 0) {
                currentSlideIndex = (currentSlideIndex - 1 + slides.length) % slides.length;
                showSlide(currentSlideIndex);
            }
        }
        
        function toggleZoom(slideElement) {
            isZoomed = !isZoomed;
            slideElement.classList.toggle('zoomed');
            document.body.style.overflow = isZoomed ? 'hidden' : 'hidden';
            if (!isZoomed) {
                const wrapper = document.getElementById('previewWrapper');
                wrapper.appendChild(slideElement);
                slideElement.style.position = 'relative';
                slideElement.style.transform = 'none';
                slideElement.style.top = 'auto';
                slideElement.style.left = 'auto';
                slideElement.style.maxWidth = '100%';
                slideElement.style.maxHeight = '100%';
            }
        }

        function updateCurrentSlide() {
            if (currentSlideIndex === -1) return;
            const currentSlide = document.querySelector(`.preview-page[data-index="${currentSlideIndex}"]`);
            if (!currentSlide) return;

            const slideType = slides[currentSlideIndex].type;
            
            // Логика обновления контента слайдов
            if (slideType === 'general') {
                const bannerValue = document.getElementById('banner').value;
                const logosValue = document.getElementById('logos').value;
                currentSlide.querySelector('#previewBanner').src = bannerValue;
                currentSlide.querySelector('#previewLogos').src = logosValue;
            } else if (slideType === 'pricing') {
                const managerValue = document.getElementById('manager').value;
                const phoneTypeValue = document.querySelector('input[name="phoneType"]:checked').value;
                const priceColumnsValue = document.querySelector('input[name="priceColumns"]:checked').value;
                const commentValue = document.getElementById('comment').value;
                const priceBannerValue = document.getElementById('priceBanner').value;
                
                const managerData = managerLinks[managerValue];
                currentSlide.querySelector('#previewManager').src = managerData.image;
                const managerLinkElement = currentSlide.querySelector('#managerLink');
                managerLinkElement.href = managerData.link;
                
                const phoneElement = currentSlide.querySelector('#previewPhone');
                const priceElement = currentSlide.querySelector('#previewPrice');
                const commentElement = currentSlide.querySelector('#previewComment');
                const priceTableElement = currentSlide.querySelector('#priceTable');
                const priceBannerElement = currentSlide.querySelector('#previewPriceBanner');
                
                if (phoneTypeValue === 'personal') {
                    const personalPhone = document.getElementById('personalPhone').value;
                    phoneElement.textContent = personalPhone;
                } else {
                    phoneElement.textContent = '8 800 505 50 16';
                }

                if (priceColumnsValue === '1') {
                    const price1Value = document.getElementById('price1Value').value;
                    priceElement.textContent = `от ${price1Value} ₽/мес`;
                    priceElement.style.display = 'block';
                    priceTableElement.style.display = 'none';
                } else {
                    const price3Value1 = document.getElementById('price3Value1').value;
                    const price3Value2 = document.getElementById('price3Value2').value;
                    const price3Value3 = document.getElementById('price3Value3').value;
                    
                    currentSlide.querySelector('#price3_1').textContent = `${price3Value1} ₽/мес`;
                    currentSlide.querySelector('#price3_2').textContent = `${price3Value2} ₽/мес`;
                    currentSlide.querySelector('#price3_3').textContent = `${price3Value3} ₽/мес`;
                    
                    priceElement.style.display = 'none';
                    priceTableElement.style.display = 'table';
                }
                
                commentElement.textContent = commentValue;
                priceBannerElement.src = priceBannerValue;

                const qrElement = currentSlide.querySelector('#previewQrCode');
                qrElement.innerHTML = '';
                new QRCode(qrElement, {
                    text: managerData.link,
                    width: 60,
                    height: 60,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            } else if (slideType === 'playlist') {
                const playlistValue = document.getElementById('playlist').value;
                currentSlide.querySelector('#previewPlaylist').src = playlistValue;
            } else if (slideType === 'premium') {
                const premiumPrice = document.getElementById('premiumPrice').value;
                const premiumComment = document.getElementById('premiumComment').value;
                currentSlide.querySelector('#previewPremiumPrice').textContent = `от ${premiumPrice} ₽/мес`;
                currentSlide.querySelector('#previewPremiumComment').textContent = premiumComment;
            } else if (slideType === 'videokp') {
                const videokpPrice = document.getElementById('videokpPrice').value;
                const videokpComment = document.getElementById('videokpComment').value;
                currentSlide.querySelector('#previewVideokpPrice').textContent = `от ${videokpPrice} ₽/мес`;
                currentSlide.querySelector('#previewVideokpComment').textContent = videokpComment;
            }
        }
        
        async function saveToPdf() {
            // Показываем попап
            const popup = document.getElementById('pdf-popup');
            popup.style.display = 'flex';

            const pdf = new window.jspdf.jsPDF('p', 'mm', 'a4');
            const pages = document.querySelectorAll('.preview-page');
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            const scaleFactor = 1.3; // Коэффициент масштабирования для адаптации к PDF

            // Добавляем класс для адаптации размеров элементов
            document.querySelectorAll('.preview-page').forEach(page => {
                page.classList.add('pdf-export-size');
            });
            
            // Даем браузеру время на перерисовку с новыми стилями
            await new Promise(resolve => setTimeout(resolve, 500));

            for (let i = 0; i < pages.length; i++) {
                const page = pages[i];
                if (i > 0) {
                    pdf.addPage();
                }

                const canvas = await html2canvas(page, {
                    scale: 2, // Увеличиваем разрешение для лучшего качества
                    useCORS: true,
                });

                const imgData = canvas.toDataURL('image/png');
                const imgProps = pdf.getImageProperties(imgData);
                const ratio = imgProps.width / imgProps.height;
                const imgHeight = pageWidth / ratio;
                pdf.addImage(imgData, 'PNG', 0, 0, pageWidth, imgHeight);
            }
            
            pdf.save('commercial-offer.pdf');

            // Удаляем класс после сохранения PDF
            document.querySelectorAll('.preview-page').forEach(page => {
                page.classList.remove('pdf-export-size');
            });

            // Скрываем попап
            popup.style.display = 'none';
        }

        // Обработчики событий
        document.addEventListener('DOMContentLoaded', () => {
            // Инициализируем первый слайд
            addSlide('general');
            
            // Обработчик для переключения между 1 и 3 колонками цен
            document.querySelectorAll('input[name="priceColumns"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const value = e.target.value;
                    const price1Container = document.getElementById('price1Container');
                    const price3Container = document.getElementById('price3Container');
                    price1Container.classList.toggle('hidden', value !== '1');
                    price3Container.classList.toggle('hidden', value !== '3');
                    updateCurrentSlide();
                });
            });

            // Обработчик для переключения между служебным и личным телефоном
            document.querySelectorAll('input[name="phoneType"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const value = e.target.value;
                    const personalPhoneContainer = document.getElementById('personalPhoneContainer');
                    personalPhoneContainer.classList.toggle('hidden', value !== 'personal');
                    updateCurrentSlide();
                });
            });
            
            // Обновление слайдов при изменении данных
            document.getElementById('banner').addEventListener('change', updateCurrentSlide);
            document.getElementById('logos').addEventListener('change', updateCurrentSlide);
            document.getElementById('manager').addEventListener('change', updateCurrentSlide);
            document.getElementById('personalPhone').addEventListener('input', updateCurrentSlide);
            document.getElementById('price1Value').addEventListener('input', updateCurrentSlide);
            document.getElementById('price3Value1').addEventListener('input', updateCurrentSlide);
            document.getElementById('price3Value2').addEventListener('input', updateCurrentSlide);
            document.getElementById('price3Value3').addEventListener('input', updateCurrentSlide);
            document.getElementById('comment').addEventListener('input', updateCurrentSlide);
            document.getElementById('priceBanner').addEventListener('change', updateCurrentSlide);
            document.getElementById('playlist').addEventListener('change', updateCurrentSlide);
            document.getElementById('premiumPrice').addEventListener('input', updateCurrentSlide);
            document.getElementById('premiumComment').addEventListener('input', updateCurrentSlide);
            document.getElementById('videokpPrice').addEventListener('input', updateCurrentSlide);
            document.getElementById('videokpComment').addEventListener('input', updateCurrentSlide);
            
            // Инициализация кнопок слайдов
            updateSlideNumbers();
            
            // Показываем первый слайд и раскрываем его настройки
            showSlide(0);
            document.querySelector('.menu-header').click();
        });
    </script>
</body>
