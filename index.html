<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор коммерческого предложения</title>
    <style>
        :root {
            --button-color: #00b398;
            --button-hover: #008f79;
            --button-text: white;
            --text-color: #667099;
            --active-color: #008f79;
            --input-bg: #f6f6f9;
            --input-border: hsl(228, 20%, 97%);
            --sidebar-width: 30vw;
            --preview-width: 70vw;
            --qr-size: 60px;
            --control-icon-size: 30px;
            --instruction-text-size: 18px;
            --preview-price-size: 24px;
            --preview-comment-size: 20px;
            --preview-phone-size: 20px;
            --price-table-size: 20px;
            --link-image-size: 100px;
        }
        
        body {
            font-family: 'SB Sans', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            background-color: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        /* Режимы для превью и PDF */
        body.preview-mode .instruction-text { font-size: var(--instruction-text-size); }
        body.preview-mode .preview-price { font-size: var(--preview-price-size); }
        body.preview-mode .preview-comment { font-size: var(--preview-comment-size); }
        body.preview-mode .preview-phone { font-size: var(--preview-phone-size); }
        body.preview-mode .price-table { font-size: var(--price-table-size); }
        body.preview-mode .preview-video { width: var(--link-image-size); height: var(--link-image-size); }
        body.preview-mode .preview-logos { width: 50%; max-height: 15%; }
        body.preview-mode .preview-qr { width: var(--qr-size); height: var(--qr-size); }

        body.pdf-mode {
            background-color: white;
            color: black;
            font-size: 24px;
        }
        body.pdf-mode .preview-page {
            box-shadow: none;
            width: 100%;
            height: 100%;
        }
        body.pdf-mode .instruction-text { font-size: calc(var(--instruction-text-size) * 1.5); }
        body.pdf-mode .preview-price { font-size: calc(var(--preview-price-size) * 1.5); }
        body.pdf-mode .preview-comment { font-size: calc(var(--preview-comment-size) * 1.5); }
        body.pdf-mode .preview-phone { font-size: calc(var(--preview-phone-size) * 1.5); }
        body.pdf-mode .price-table { font-size: calc(var(--price-table-size) * 1.5); }
        body.pdf-mode .preview-video { width: calc(var(--link-image-size) * 1.5); height: calc(var(--link-image-size) * 1.5); }
        body.pdf-mode .preview-logos { width: 75%; max-height: 20%; }
        body.pdf-mode .preview-qr { width: calc(var(--qr-size) * 1.5); height: calc(var(--qr-size) * 1.5); }
        body.pdf-mode .menu-container, body.pdf-mode .action-buttons, body.pdf-mode .preview-controls, body.pdf-mode .slide-controls-container {
            display: none;
        }

        .menu-container {
            width: var(--sidebar-width);
            background-color: white;
            padding: 20px;
            height: 100%;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        
        .menu-header-container {
            display: flex;
            flex-direction: column;
            margin-bottom: 30px;
        }
        
        .menu-logo {
            height: 24px;
            width: auto;
            object-fit: contain;
            align-self: flex-start;
            margin-bottom: 16px;
        }
        
        .menu-title {
            color: #3d435c;
            font-weight: 600;
            font-size: 24px;
            font-family: 'SBSansText', sans-serif;
        }
        
        .menu-sections {
            flex-grow: 1;
            overflow-y: auto;
        }
        
        .menu-section-header {
            color: #3d435c;
            font-weight: 600;
            font-size: 16px;
        }
        
        .menu-section-header.active {
            color: var(--active-color);
        }
        
        .menu-label {
            color: #667099;
            font-weight: 600;
            font-size: 16px;
            display: block;
            margin-bottom: 8px;
        }
        
        .preview-container {
            width: var(--preview-width);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow: hidden;
            position: relative;
            background-color: #f8f8f8;
        }
        
        .preview-wrapper {
            position: relative;
            margin-bottom: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            height: 90%;
        }
        
        .preview-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
        }
        
        .delete-slide-btn {
            background-color: transparent;
            border: none;
            cursor: pointer;
            width: 24px;
            height: 24px;
            padding: 0;
        }
        
        .delete-slide-btn img {
            width: 100%;
            height: 100%;
        }
        
        .slide-controls-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            width: 100%;
        }
        
        .slide-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
        }
        
        #slideNumbers {
            display: flex;
            gap: 8px;
        }
        
        .control-icon {
            width: var(--control-icon-size);
            height: var(--control-icon-size);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .control-icon img {
            width: 24px;
            height: 24px;
        }
        
        .slide-number {
            width: var(--control-icon-size);
            height: var(--control-icon-size);
            border-radius: 50%;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 500;
            color: #3d435c;
            user-select: none;
            transition: transform 0.3s ease;
        }
        
        .slide-number.active {
            background-color: var(--button-color);
            color: white;
        }
        
        .slide-number.dragging {
            opacity: 0.5;
            transform: scale(1.2);
        }
        
        .slide-number.drop-target {
            transform: scale(1.1);
            background-color: var(--button-hover);
            color: white;
        }
        
        .preview-page {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            transform-origin: center center;
            cursor: pointer;
        }
        
        .preview-page.zoomed {
            transform: scale(1.4);
            z-index: 100;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.4);
            max-width: 70vw;
            max-height: 70vh;
        }
        
        .preview-bg {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }
        
        .preview-banner {
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            width: 100%;
            object-fit: fill;
        }
        
        .preview-logos {
            position: absolute;
            bottom: 6%;
            left: 2%;
            width: 50%;
            max-height: 15%;
            object-fit: contain;
        }
        
        .preview-price {
            position: absolute;
            top: 63%;
            left: 3%;
            color: white;
            font-size: var(--preview-price-size);
            font-weight: bold;
            width: 80%;
        }
        
        .preview-comment {
            position: absolute;
            top: 69%;
            left: 3%;
            color: #D9D9D9;
            font-size: var(--preview-comment-size);
            width: 80%;
            font-weight: 500;
        }
        
        .price-table {
            position: absolute;
            top: 55%;
            left: 3%;
            width: 60%;
            color: white;
            font-size: var(--price-table-size);
            border-collapse: collapse;
        }
        
        .price-table th, .price-table td {
            padding: 10px;
            text-align: left;
            border: 1px solid #303030;
        }
        
        .price-table th {
            background-color: rgba(0,0,0,0.3);
        }
        
        .preview-manager-container {
            position: absolute;
            bottom: 8%;
            left: 0%;
            width: 100%;
        }

        .preview-manager {
            width: 100%;
            object-fit: contain;
        }
        
        .preview-manager-link {
            position: absolute;
            bottom: 8%;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .preview-phone {
            position: absolute;
            bottom: 13.5%;
            left: 11.5%;
            color: white;
            font-size: var(--preview-phone-size);
            font-weight: 600;
        }
        
        .preview-qr {
            position: absolute;
            bottom: 8%;
            right: 39%;
            width: var(--qr-size);
            height: var(--qr-size);
            background-color: white;
            border-radius: 8px;
            padding:7px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .preview-qr img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .preview-link {
            position: absolute;
            bottom: 5%;
            right: 5%;
            color: transparent; 
        }
        
        .preview-video {
            position: absolute;
            bottom: 0%;
            left: 35%;
            width: var(--link-image-size);
            height: var(--link-image-size);
        }

        .preview-video img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .menu-section {
            margin-bottom: 8px;
            border-bottom: 1px solid #eee;
            padding-bottom: 2px;
        }
        
        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .menu-content {
            display: none;
            padding-left: 0px;
        }
        
        .menu-content.active {
            display: block;
        }
        
        .toggle-button {
            font-size: 26px;
            color: #3d435c;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid var(--input-border);
            background-color: var(--input-bg);
            border-radius: 8px;
            color: var(--text-color);
            font-weight: 500;
            font-size: 16px;
            font-family: 'SB Sans', sans-serif;
        }
        
        input[type="number"] {
            -moz-appearance: textfield;
        }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: var(--button-color);
        }
        
        .radio-group {
            margin-bottom: 15px;
        }
        
        .radio-option {
            margin-bottom: 0px;
            display: flex;
            align-items: baseline;
        }
        
        .radio-option input {
            width: auto;
            margin-right: 4px;
        }
        
        .radio-option label {
            color: var(--text-color);
            font-weight: 500;
            font-size: 16px;
        }
        
        .price-columns {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .price-column {
            flex: 1;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top:20px;
            position: sticky;
            bottom: 40px;
            background: white;
            z-index: 10;
        }
        
        button {
            padding: 12px 12px;
            background-color: var(--button-color);
            color: var(--button-text);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'SB Sans', sans-serif;
            font-size: 16px;
            font-weight: 500;
            transition: background-color 0.3s;
            flex: 1;
        }
        
        button:hover {
            background-color: var(--button-hover);
        }
        
        .add-slide-btn {
            background-color: var(--button-color);
            color: white;
            margin-top: 10px;
        }
        
        .remove-slide-btn {
            background-color: #7F7F7F;
            color: white;
            margin-top: 10px;
        }
        
        .hidden {
            display: none;
        }
        
        .phone-type {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .phone-type label {
            display: flex;
            align-items: baseline;
            gap: 5px;
            color: var(--text-color);
            font-weight: 500;
            font-size: 16px;
        }

        .instruction-text {
            position: absolute;
            top: 40%;
            left: 3%;
            color: white;
            font-size: var(--instruction-text-size);
            font-weight: 500;
            width: 40%;
            line-height: 1.6;
        }

        .instruction-text a {
            color: var(--button-color);
            text-decoration: none;
            font-weight: 500;
        }
        
        /* Popup Modal Styles */
        .popup-modal {
            display: none;
            position: fixed;
            z-index: 200;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
        }

        .popup-modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-family: 'SB Sans', sans-serif;
            font-size: 18px;
            color: #3d435c;
        }
            
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow: auto;
                height: auto;
            }

            .menu-container {
                width: 100vw;
                height: 45vh;
                box-shadow: none;
                padding: 10px;
                overflow-y: auto;
            }

            .preview-container {
                width: 100vw;
                height: 55vh;
                padding: 0;
                overflow: hidden;
            }

            .preview-wrapper {
                height: 100%;
            }

            .preview-page {
                height: 100% !important;
                width: 100% !important;
                max-width: 100%;
                max-height: 100%;
            }

            .preview-page.zoomed {
                position: absolute;
                top: 0;
                left: 0;
                transform: scale(1.2);
                width: 100%;
                height: 100%;
            }

            .action-buttons {
                position: fixed;
                bottom: 10px;
                left: 10px;
                right: 10px;
                flex-direction: row;
                gap: 10px;
                background: transparent;
                padding: 10px;
                border-radius: 8px;
                z-index: 100;
            }
        }
        /* Специальные стили для Safari */
        @media not all and (min-resolution:.001dpcm) { 
            @supports (-webkit-appearance:none) {
                .menu-container {
                    height: 45vh;
                    overflow-y: scroll;
                    -webkit-overflow-scrolling: touch;
                }
                .preview-container {
                    height: 55vh;
                }
            }
        }

        /* Стили для Firefox */
        @-moz-document url-prefix() {
            .menu-container {
                scrollbar-width: thin;
            }
        }
    </style>

</head>

                newSlideData.text = document.getElementById('instructionTextarea').value;

                newSlideData.image1 = document.getElementById('linkImage1').value;

                newSlideData.image2 = document.getElementById('linkImage2').value;
                newSlideData.link2 = document.getElementById('linkImage2').options[document.getElementById('linkImage2').selectedIndex].getAttribute('data-link');
            }
            
            const newSlide = createSlide(type, newSlideData);
            slides.push(newSlide);
            renderSlides();
            showSlide(slides.length - 1);
            updateSlideNumbers();
        }

        // Удаление слайда
        function removeSlide(type) {
            const indexToRemove = slides.findIndex(slide => slide.type === type);
            if (indexToRemove !== -1) {
                slides.splice(indexToRemove, 1);
                currentSlideIndex = Math.max(0, currentSlideIndex - 1);
                renderSlides();
                showSlide(currentSlideIndex);
                updateSlideNumbers();
            }
        }

                }

                previewPage.innerHTML = contentHTML;
                previewWrapper.appendChild(previewPage);

                // Добавляем event listeners для перетаскивания
                previewPage.addEventListener('dragstart', handleDragStart);
                previewPage.addEventListener('dragover', handleDragOver);
                previewPage.addEventListener('dragenter', handleDragEnter);
                previewPage.addEventListener('dragleave', handleDragLeave);
                previewPage.addEventListener('dragend', handleDragEnd);
                previewPage.draggable = true;
            });
            showSlide(currentSlideIndex);
        }

        // Показать конкретный слайд
        function showSlide(index) {
            const previewPages = document.querySelectorAll('.preview-page');
            const slideNumbers = document.querySelectorAll('.slide-number');
            
            if (index < 0 || index >= previewPages.length) return;
            
            previewPages.forEach(page => page.style.display = 'none');
            slideNumbers.forEach(number => number.classList.remove('active'));

            previewPages[index].style.display = 'block';
            slideNumbers[index].classList.add('active');

            currentSlideIndex = index;
            showSlideMenu(slides[index].type);
            updateCurrentSlide();
        }

        // Показать следующий слайд
        function nextSlide() {
            let newIndex = (currentSlideIndex + 1) % slides.length;
            showSlide(newIndex);
        }

        // Показать предыдущий слайд
        function prevSlide() {
            let newIndex = (currentSlideIndex - 1 + slides.length) % slides.length;
            showSlide(newIndex);
        }
        
        // Обновление кнопок нумерации слайдов
        function updateSlideNumbers() {
            const slideNumbersContainer = document.getElementById('slideNumbers');
            slideNumbersContainer.innerHTML = '';
            
            slides.forEach((slide, index) => {
                const numberBtn = document.createElement('div');
                numberBtn.className = 'slide-number';
                numberBtn.textContent = index + 1;
                numberBtn.setAttribute('data-index', index);
                numberBtn.addEventListener('click', () => showSlide(index));
                
                // Добавляем event listeners для перетаскивания
                numberBtn.addEventListener('dragstart', handleDragStart);
                numberBtn.addEventListener('dragover', handleDragOver);
                numberBtn.addEventListener('dragenter', handleDragEnter);
                numberBtn.addEventListener('dragleave', handleDragLeave);
                numberBtn.addEventListener('dragend', handleDragEnd);
                numberBtn.draggable = true;

                slideNumbersContainer.appendChild(numberBtn);
            });
            
            if (slides.length > 0) {
                document.querySelectorAll('.slide-number')[currentSlideIndex].classList.add('active');
            }
        }
        
        // Переключение меню настроек
        function toggleMenu(header, sectionName) {
            const content = header.nextElementSibling;
            const toggleButton = header.querySelector('.toggle-button');
            const sectionHeaders = document.querySelectorAll('.menu-section-header');
            
            // Скрываем все разделы, кроме текущего
            document.querySelectorAll('.menu-content').forEach(c => {
                if (c !== content) c.style.display = 'none';
            });
            document.querySelectorAll('.toggle-button').forEach(b => {
                if (b !== toggleButton) b.textContent = '+';
            });
            sectionHeaders.forEach(h => h.classList.remove('active'));

            if (content.style.display === 'block') {
                content.style.display = 'none';
                toggleButton.textContent = '+';
            } else {
                content.style.display = 'block';
                toggleButton.textContent = '-';
                header.querySelector('.menu-section-header').classList.add('active');
            }
        }
        
        // Показать соответствующее меню для текущего слайда
        function showSlideMenu(slideType) {
            const allHeaders = document.querySelectorAll('.menu-header');
            allHeaders.forEach(header => {
                const content = header.nextElementSibling;
                const toggleButton = header.querySelector('.toggle-button');
                const sectionHeader = header.querySelector('.menu-section-header');
                
                content.style.display = 'none';
                toggleButton.textContent = '+';
                sectionHeader.classList.remove('active');

                if (header.onclick.toString().includes(`'${slideType}'`)) {
                    content.style.display = 'block';
                    toggleButton.textContent = '-';
                    sectionHeader.classList.add('active');
                }
            });
        }

        // Переключение масштаба превью
        function toggleZoom() {
            this.classList.toggle('zoomed');
        }

        // Сохранение в PDF
        async function saveToPdf() {
            const popup = document.getElementById('pdf-save-popup');
            popup.style.display = 'flex';

            const doc = new window.jspdf.jsPDF('portrait', 'pt', 'a4');
            const previewWrapper = document.getElementById('previewWrapper');
            const slidesCount = slides.length;
            
            document.body.classList.remove('preview-mode');
            document.body.classList.add('pdf-mode');

            for (let i = 0; i < slidesCount; i++) {
                showSlide(i);
                
                const slideToSave = previewWrapper.querySelector('.preview-page[data-slide-id="' + slides[i].id + '"]');

                // Создаем временный div для рендеринга html2canvas
                const tempDiv = document.createElement('div');
                tempDiv.style.width = '595px';
                tempDiv.style.height = '842px';
                tempDiv.style.position = 'absolute';
                tempDiv.style.left = '-9999px';
                document.body.appendChild(tempDiv);
                tempDiv.innerHTML = slideToSave.outerHTML;
                const tempSlide = tempDiv.querySelector('.preview-page');

                // Ожидание загрузки изображений
                await Promise.all(Array.from(tempSlide.querySelectorAll('img')).map(img => {
                    if (img.complete) return;
                    return new Promise((resolve) => {
                        img.onload = resolve;
                        img.onerror = resolve;
                    });
                }));

                const canvas = await html2canvas(tempSlide, {
                    scale: 3, // Увеличение масштаба для лучшего качества
                    useCORS: true // Разрешить использование cross-origin изображений
                });

                const imgData = canvas.toDataURL('image/jpeg');

                const width = doc.internal.pageSize.getWidth();
                const height = doc.internal.pageSize.getHeight();
                doc.addImage(imgData, 'JPEG', 0, 0, width, height);

                // Добавление кликабельных ссылок
                const links = tempSlide.querySelectorAll('a');
                links.forEach(link => {
                    const rect = link.getBoundingClientRect();
                    const canvasRect = tempSlide.getBoundingClientRect();

                    const x = (rect.left - canvasRect.left) * width / canvasRect.width;
                    const y = (rect.top - canvasRect.top) * height / canvasRect.height;
                    const w = rect.width * width / canvasRect.width;
                    const h = rect.height * height / canvasRect.height;
                    
                    doc.link(x, y, w, h, { url: link.href });
                });

                document.body.removeChild(tempDiv);
                
                if (i < slidesCount - 1) {
                    doc.addPage();
                }
            }

            doc.save('commercial_offer.pdf');

            document.body.classList.remove('pdf-mode');
            document.body.classList.add('preview-mode');
            
            popup.style.display = 'none';
        }

        // Функции для перетаскивания
        function handleDragStart(e) {
            this.style.opacity = '0.4';
            draggingElement = this;
            if (this.classList.contains('slide-number')) {
                dragStartIndex = parseInt(this.getAttribute('data-index'));
            } else if (this.classList.contains('preview-page')) {
                dragStartIndex = Array.from(this.parentNode.children).indexOf(this);
            }
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function handleDragEnter(e) {
            e.preventDefault();
            if (this !== draggingElement) {
                this.classList.add('drop-target');
            }
        }

        function handleDragLeave(e) {
            this.classList.remove('drop-target');
        }

        function handleDragEnd(e) {
            this.style.opacity = '1';
            const dropTargets = document.querySelectorAll('.drop-target');
            dropTargets.forEach(target => target.classList.remove('drop-target'));

            const dropIndex = parseInt(this.getAttribute('data-index')) || Array.from(this.parentNode.children).indexOf(this);

            if (dragStartIndex !== -1 && dragStartIndex !== dropIndex) {
                const [draggedSlide] = slides.splice(dragStartIndex, 1);
                slides.splice(dropIndex, 0, draggedSlide);

                renderSlides();
                currentSlideIndex = dropIndex;
                updateSlideNumbers();
                showSlide(currentSlideIndex);
            }
            draggingElement = null;
            dragStartIndex = -1;
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            // Инициализация слайдов по умолчанию
            slides.push(createSlide('general', {
                background: 'images/bg1.png',
                logos: 'images/mainlogos.png',
                managerImage: 'images/mankova.png',
                managerPhone: '8 800 220 56 65',
                managerLink: document.querySelector('#manager option[value="images/mankova.png"]').getAttribute('data-link')
            }));
            slides.push(createSlide('pricing', {
                managerImage: 'images/mankova.png',
                managerPhone: '8 800 220 56 65',
                managerLink: document.querySelector('#manager option[value="images/mankova.png"]').getAttribute('data-link'),
                priceBanner: 'images/bkids.png'
            }));

            renderSlides();
            
            // Event listeners для обновления превью
            document.getElementById('banner').addEventListener('change', updateCurrentSlide);
            document.getElementById('logos').addEventListener('change', updateCurrentSlide);
            document.getElementById('manager').addEventListener('change', updateCurrentSlide);
            document.querySelectorAll('input[name="phoneType"]').forEach(radio => {
                radio.addEventListener('change', () => {
                    const personalPhoneContainer = document.getElementById('personalPhoneContainer');
                    personalPhoneContainer.classList.toggle('hidden', radio.value === 'service');
                    updateCurrentSlide();
                });
            });
            document.getElementById('personalPhone').addEventListener('input', updateCurrentSlide);
            document.querySelectorAll('input[name="priceColumns"]').forEach(radio => {
                radio.addEventListener('change', () => {
                    const price1Container = document.getElementById('price1Container');
                    const price3Container = document.getElementById('price3Container');
                    price1Container.classList.toggle('hidden', radio.value === '3');
                    price3Container.classList.toggle('hidden', radio.value === '1');
                    updateCurrentSlide();
                });
            });
            document.getElementById('price1Value').addEventListener('input', updateCurrentSlide);
            document.getElementById('price3Value1').addEventListener('input', updateCurrentSlide);
            document.getElementById('price3Value2').addEventListener('input', updateCurrentSlide);
            document.getElementById('price3Value3').addEventListener('input', updateCurrentSlide);
            document.getElementById('comment').addEventListener('input', updateCurrentSlide);
            document.getElementById('priceBanner').addEventListener('change', updateCurrentSlide);
            document.getElementById('playlist').addEventListener('change', updateCurrentSlide);
            document.getElementById('premiumPrice').addEventListener('input', updateCurrentSlide);
            document.getElementById('premiumComment').addEventListener('input', updateCurrentSlide);
            document.getElementById('videokpPrice').addEventListener('input', updateCurrentSlide);
            document.getElementById('videokpComment').addEventListener('input', updateCurrentSlide);
            document.getElementById('instructionTitle').addEventListener('input', updateCurrentSlide);
            document.getElementById('instructionTextarea').addEventListener('input', updateCurrentSlide);
            document.getElementById('linkImage1').addEventListener('change', updateCurrentSlide);
            document.getElementById('linkImage2').addEventListener('change', updateCurrentSlide);
            
            updateSlideNumbers();
            showSlide(0);
            document.querySelector('.menu-header').click();
        });
    </script>
