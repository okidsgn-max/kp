<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор коммерческого предложения</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ... (остальные стили остаются без изменений) ... */

        .preview-page {
            position: relative;
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            transition: all var(--transition-medium);
            transform-origin: center center;
            cursor: pointer;
            aspect-ratio: 16 / 9;
            margin: auto;
            background-color: #16151A; /* Добавлен фон по умолчанию */
        }

        .preview-video {
            position: absolute;
            bottom: 0%;
            left: 35%;
            width: 130px; /* Увеличение на 30% (было 100px) */
            height: 130px; /* Увеличение на 30% (было 100px) */
            transition: all var(--transition-medium);
        }

        /* Мобильная версия */
        @media (max-width: 800px) {
            /* ... (остальные стили мобильной версии остаются без изменений) ... */

            /* Уменьшение картинок и ссылок в мобильной версии */
            .preview-video {
                width: 39px; /* Уменьшение на 70% (130px * 0.3) */
                height: 39px; /* Уменьшение на 70% (130px * 0.3) */
            }
            
            /* Уменьшение текста инструкции в мобильной версии */
            .instruction-text {
                font-size: 7.2px; /* Уменьшение на 60% (12px * 0.4) */
                width: 50%;
            }
            
            /* Уменьшение стоимости в мобильной версии */
            .preview-price {
                font-size: 10px; /* Уменьшение на 50% (20px * 0.5) */
            }
        }
    </style>
</head>
<body>
    <!-- ... (остальная разметка остаётся без изменений) ... -->

    <script>
        // ... (остальной JavaScript остаётся без изменений до функции saveAsPDF) ...

        async function saveAsPDF() {
            const popup = document.getElementById('pdf-popup');
            const blurOverlay = document.querySelector('.blur-overlay');
            
            blurOverlay.style.display = 'block';
            popup.style.display = 'block';
            
            const fileName = getFileName() + '.pdf';
            const pdf = new jsPDF({
                orientation: 'landscape',
                unit: 'px',
                format: [1920, 1080]
            });

            const tempContainer = document.createElement('div');
            tempContainer.style.position = 'absolute';
            tempContainer.style.left = '-9999px';
            tempContainer.style.top = '0px';
            tempContainer.style.width = '1920px';
            tempContainer.style.height = '1080px';
            document.body.appendChild(tempContainer);
            
            const originalSlideIndex = currentSlideIndex; 

            for (let i = 0; i < slides.length; i++) {
                showSlide(i + 1); 
                
                const slideContent = document.getElementById('currentSlide').cloneNode(true);
                slideContent.style.width = '1920px';
                slideContent.style.height = '1080px';
                slideContent.style.transform = 'none';
                slideContent.classList.remove('zoomed');
                
                // Увеличение элементов для PDF
                if (['app', 'creative'].includes(slides[i].type)) {
                    const images = slideContent.querySelectorAll('img[src*="coffeoneprice"], img[src*="letual"]');
                    images.forEach(img => {
                        img.style.width = '210px'; // Увеличение на 110% (100px * 2.1)
                        img.style.height = '210px'; // Увеличение на 110% (100px * 2.1)
                    });
                    
                    const links = slideContent.querySelectorAll('a');
                    links.forEach(link => {
                        if (link.querySelector('img[src*="coffeoneprice"], img[src*="letual"]')) {
                            link.style.width = '210px';
                            link.style.height = '210px';
                        }
                    });
                }
                
                // Увеличение текста инструкции в PDF
                if (slides[i].type === 'instruction') {
                    const instructionText = slideContent.querySelector('.instruction-text');
                    if (instructionText) {
                        instructionText.style.fontSize = '22.8px'; // Увеличение на 90% (12px * 1.9)
                        instructionText.style.width = '70%';
                    }
                }
                
                // Увеличение стоимости в PDF
                if (slides[i].type === 'pricing' || slides[i].type === 'premium' || slides[i].type === 'videokp') {
                    const priceText = slideContent.querySelector('.preview-price');
                    if (priceText) {
                        priceText.style.fontSize = '30px'; // Увеличение на 50% (20px * 1.5)
                    }
                }
                
                tempContainer.innerHTML = '';
                tempContainer.appendChild(slideContent);
                
                const images = tempContainer.querySelectorAll('img');
                const promises = [];
                images.forEach(img => {
                    if (!img.complete) {
                        promises.push(new Promise((resolve, reject) => {
                            img.onload = resolve;
                            img.onerror = resolve;
                        }));
                    }
                });
                await Promise.all(promises);

                await new Promise(resolve => setTimeout(resolve, 250));

                const canvas = await html2canvas(tempContainer, {
                    scale: 1,
                    logging: false,
                    useCORS: true,
                    width: 1920,
                    height: 1080,
                    letterRendering: true
                });

                const imgData = canvas.toDataURL('image/jpeg', 0.95);
                
                if (i > 0) {
                    pdf.addPage([1920, 1080], 'landscape');
                }
                
                pdf.addImage(imgData, 'JPEG', 0, 0, 1920, 1080);
                addLinksToPDF(pdf, slideContent, i);
            }
            
            showSlide(originalSlideIndex + 1);
            document.body.removeChild(tempContainer);

            pdf.save(fileName);
            
            setTimeout(() => {
                popup.style.display = 'none';
                blurOverlay.style.display = 'none';
            }, 2000);
        }

        // ... (остальной JavaScript остаётся без изменений) ...
    </script>
</body>
</html>
