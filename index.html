<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор коммерческого предложения</title>
    <style>
        :root {
            --button-color: #00b398;
            --button-hover: #008f79;
            --button-text: white;
            --text-color: #667099;
            --active-color: #008f79;
            --input-bg: #f6f6f9;
            --input-border: hsl(228, 20%, 97%);
            --sidebar-width: 30vw;
            --preview-width: 70vw;
            --qr-size: 60px;
            --control-icon-size: 30px;
        }
        
        body {
            font-family: 'SB Sans', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            background-color: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }
        
        .menu-container {
            width: var(--sidebar-width);
            background-color: white;
            padding: 20px;
            height: 100%;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        
        .menu-header-container {
            display: flex;
            flex-direction: column;
            margin-bottom: 30px;
        }
        
        .menu-logo {
            height: 24px;
            width: auto;
            object-fit: contain;
            align-self: flex-start;
            margin-bottom: 16px;
        }
        
        .menu-title {
            color: #3d435c;
            font-weight: 600;
            font-size: 24x;
            font-family: 'SBSansText', sans-serif;
        }
        
        .menu-sections {
            flex-grow: 1;
            overflow-y: auto;
        }
        
        .menu-section-header {
            color: #3d435c;
            font-weight: 600;
            font-size: 16px;
        }
        
        .menu-section-header.active {
            color: var(--active-color);
        }
        
        .menu-label {
            color: #667099;
            font-weight: 600;
            font-size: 16px;
            display: block;
            margin-bottom: 8px;
        }
        
        .preview-container {
            width: var(--preview-width);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow: hidden;
            position: relative;
            background-color: #f8f8f8;
        }
        
        .preview-wrapper {
            position: relative;
            margin-bottom: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            height: 90%;
        }
        
        .preview-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
        }
        
        .delete-slide-btn {
            background-color: transparent;
            border: none;
            cursor: pointer;
            width: 24px;
            height: 24px;
            padding: 0;
        }
        
        .delete-slide-btn img {
            width: 100%;
            height: 100%;
        }
        
        .slide-controls-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            width: 100%;
        }
        
        .slide-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
        }
        
        #slideNumbers {
            display: flex;
            gap: 8px;
        }
        
        .control-icon {
            width: var(--control-icon-size);
            height: var(--control-icon-size);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .control-icon img {
            width: 24px;
            height: 24px;
        }
        
        .slide-number {
            width: var(--control-icon-size);
            height: var(--control-icon-size);
            border-radius: 50%;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 500;
            color: #3d435c;
            user-select: none;
            transition: transform 0.3s ease;
        }
        
        .slide-number.active {
            background-color: var(--button-color);
            color: white;
        }
        
        .slide-number.dragging {
            opacity: 0.5;
            transform: scale(1.2);
        }
        
        .slide-number.drop-target {
            transform: scale(1.1);
            background-color: var(--button-hover);
            color: white;
        }
        
        .preview-page {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            transform-origin: center center;
            cursor: pointer;
        }
        
        .preview-page.zoomed {
            transform: scale(1.4);
            z-index: 100;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.4);
            max-width: 70vw;
            max-height: 70vh;
        }
        
        .preview-bg {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }
        
        .preview-banner {
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            width: 100%;
            object-fit: fill;
        }
        
        .preview-logos {
            position: absolute;
            bottom: 6%;
            left: 2%;
            width: 50%;
            max-height: 15%;
            object-fit: contain;
        }
        
        .preview-price {
            position: absolute;
            top: 65%;
            left: 3%;
            color: white;
            font-size: 22px;
            font-weight: bold;
            width: 50%;
        }
        
        .preview-comment {
            position: absolute;
            top: 60%;
            left: 3%;
            color: #D9D9D9;
            font-size: 12px;
            width:100%;
            t: 500;
        }
        
        .price-table {
            position: absolute;
            top: 55%;
            left: 3%;
            width:60%;
            color: white;
            font-size: 12px;
            border-collapse: collapse;
        }
        
        .price-table th, .price-table td {
            padding: 10px;
            text-align: left;
            border: 1px solid #303030;
        }
        
        .price-table th {
            background-color: rgba(0,0,0,0.3);
        }
        
        .preview-manager {
            position: absolute;
            bottom: 8%;
            left: 0%;
            width: 100%;
            object-fit: contain;
        }
        
        .preview-phone {
            position: absolute;
            bottom: 16%;
            left: 32%;
            color: white;
            font-size: 7px;
            font-weight: 500;
        }
        
        .preview-qr {
            position: absolute;
            bottom: 8%;
            right: 39%;
            width: var(--qr-size);
            height: var(--qr-size);
            background-color: white;
            border-radius: 8px;
            padding:7px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .preview-qr img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .preview-link {
            position: absolute;
            bottom: 5%;
            right: 5%;
            color: transparent; 
        }
        
        .preview-video {
            position: absolute;
            bottom: 0%;
            left: 35%;
            width: 100px;
            height: 100px;
        }
        
        .preview-video img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .menu-section {
            margin-bottom: 8px;
            border-bottom: 1px solid #eee;
            padding-bottom: 2px;
        }
        
        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .menu-content {
            display: none;
            padding-left: 0px;
        }
        
        .menu-content.active {
            display: block;
        }
        
        .toggle-button {
            font-size: 26px;
            color: #3d435c;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid var(--input-border);
            background-color: var(--input-bg);
            border-radius: 8px;
            color: var(--text-color);
            font-weight: 500;
            font-size: 16px;
            font-family: 'SB Sans', sans-serif;
        }
        
        input[type="number"] {
            -moz-appearance: textfield;
        }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: var(--button-color);
        }
        
        .radio-group {
            margin-bottom: 15px;
        }
        
        .radio-option {
            margin-bottom: 0px;
            display: flex;
            align-items: baseline;
        }
        
        .radio-option input {
            width: auto;
            margin-right: 4px;
        }
        
        .radio-option label {
            color: var(--text-color);
            font-weight: 500;
            font-size: 16px;
        }
        
        .price-columns {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .price-column {
            flex: 1;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top:20px;
            position: sticky;
            bottom: 40px;
            background: white;
            z-index: 10;
        }
        
        button {
            padding: 12px 12px;
            background-color: var(--button-color);
            color: var(--button-text);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'SB Sans', sans-serif;
            font-size: 16px;
            font-weight: 500;
            transition: background-color 0.3s;
            flex: 1;
        }
        
        button:hover {
            background-color: var(--button-hover);
        }
        
        .add-slide-btn {
            background-color: var(--button-color);
            color: white;
            margin-top: 10px;
        }
        
        .remove-slide-btn {
            background-color: #7F7F7F;
            color: white;
            margin-top: 10px;
        }
        
        .hidden {
            display: none;
        }
        
        .phone-type {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .phone-type label {
            display: flex;
            align-items: baseline;
            gap: 5px;
            color: var(--text-color);
            font-weight: 500;
            font-size: 16px;
        }

        .instruction-text {
            position: absolute;
            top: 40%;
            left: 3%;
            color: white;
            font-size: 12px;
            font-weight: 500;
            width: 60%;
            line-height: 1;
        }

        .instruction-text a {
            color: var(--button-color);
            text-decoration: none;
            font-weight: 500;
        }
            
      
        /* Специальные стили для Safari */
        @media not all and (min-resolution:.001dpcm) { 
            @supports (-webkit-appearance:none) {
                .menu-container {
                    height: 45vh;
                    overflow-y: scroll;
                    -webkit-overflow-scrolling: touch;
                }
                .preview-container {
                    height: 55vh;
                }
            }
        }

        /* Стили для Firefox */
        @-moz-document url-prefix() {
            .menu-container {
                scrollbar-width: thin;
            }
        }
    </style>
</head>

    <div class="preview-container">
        <div class="preview-wrapper">
            <div id="slideContainer">
                <div class="preview-page" id="currentSlide" onclick="toggleZoom()"></div>
            </div>
            
            <div class="slide-controls-container">
                <div class="slide-controls">
                    <div class="control-icon" onclick="toggleZoom()">

                    </div>
                    <div id="slideNumbers"></div>

                        <img src="delete.svg" alt="Delete">
                    </div>

        function showSlide(index) {
            if (index < 1 || index > slides.length) return;
            
            currentSlideIndex = index - 1;
            
            document.querySelectorAll('.slide-number').forEach((btn, i) => {
                if (i === index - 1) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            updateCurrentSlide();
        }

        function addSlide(type) {

            switch(type) {
                case 'app':
                    newSlide = { type: 'app', image: 'images/app.png' };
                    break;
                case 'creative':
                    newSlide = { type: 'creative', image: 'images/createbanner.png' };
                    break;
                case 'playlist':
                    newSlide = { type: 'playlist', image: document.getElementById('playlist').value };
                    break;
                case 'partner':
                    newSlide = { type: 'partner', image: 'images/parterprogram.png' };
                    break;
                case 'premium':
                    newSlide = { 
                        type: 'premium', 
                        image: 'images/premiumbanner.png',
                        price: document.getElementById('premiumPrice').value,
                        comment: document.getElementById('premiumComment').value
                    };
                    break;

                    newSlide = { type: 'bprofile', image: 'images/bprofile.png' };
                    break;

                        price: document.getElementById('videokpPrice').value,

                    break;
                case 'videocontent':
                    newSlide = { type: 'videocontent', image: 'images/videowave.png' };
                    break;
                default:
                    return;
            }
            
            slides.push(newSlide);
            updateSlideNumbers();
            showSlide(slides.length);
        }
        
        function removeSlide(type) {
            if (slides.length <= 3) return;
            
            let indexToRemove = -1;
            for (let i = slides.length - 1; i >= 3; i--) {
                if (slides[i].type === type) {
                    indexToRemove = i;
                    break;
                }
            }
            
            if (indexToRemove === -1) return;
            
            slides.splice(indexToRemove, 1);
            updateSlideNumbers();
            
            if (currentSlideIndex >= slides.length) {
                showSlide(slides.length);
            }
        }
        
        function updateSlideNumbers() {
            const slideNumbers = document.getElementById('slideNumbers');
            slideNumbers.innerHTML = '';
            
            for (let i = 0; i < slides.length; i++) {
                const number = document.createElement('div');
                number.className = `slide-number ${i === currentSlideIndex ? 'active' : ''}`;
                number.textContent = i + 1;
                number.draggable = i >= 3;
                number.dataset.index = i;
                
                number.addEventListener('dragstart', handleDragStart);
                number.addEventListener('dragover', handleDragOver);
                number.addEventListener('drop', handleDrop);
                number.addEventListener('dragend', handleDragEnd);
                number.addEventListener('dragenter', handleDragEnter);
                number.addEventListener('dragleave', handleDragLeave);
                
                number.onclick = function() { showSlide(i + 1); };
                slideNumbers.appendChild(number);
            }
        }
        
        function handleDragStart(e) {
            draggedSlideIndex = parseInt(e.target.dataset.index);
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/html', e.target.innerHTML);
        }
        
        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }
        
        function handleDrop(e) {
            e.preventDefault();
            const targetIndex = parseInt(e.target.dataset.index);
            
            if (draggedSlideIndex !== null && draggedSlideIndex !== targetIndex && 
                draggedSlideIndex >= 3 && targetIndex >= 3) {
                const temp = slides[draggedSlideIndex];
                slides[draggedSlideIndex] = slides[targetIndex];
                slides[targetIndex] = temp;
                
                updateSlideNumbers();
                showSlide(currentSlideIndex + 1);
            }
            
            document.querySelectorAll('.slide-number').forEach(el => {
                el.classList.remove('drop-target');
            });
        }
        
        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            draggedSlideIndex = null;
            
            document.querySelectorAll('.slide-number').forEach(el => {
                el.classList.remove('drop-target');
            });
        }
        
        function handleDragEnter(e) {
            const targetIndex = parseInt(e.target.dataset.index);
            if (draggedSlideIndex !== null && draggedSlideIndex !== targetIndex && 
                draggedSlideIndex >= 3 && targetIndex >= 3) {
                e.target.classList.add('drop-target');
                dropTargetIndex = targetIndex;
            }
        }
        
        function handleDragLeave(e) {
            e.target.classList.remove('drop-target');
            dropTargetIndex = null;
        }
        
        function formatPrice(price) {
            return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        }
        
        function getFileName() {
            const managerSelect = document.getElementById('manager');
            const managerName = managerSelect.options[managerSelect.selectedIndex].text
                .toLowerCase()
                .replace(/\s+/g, '-');
            return `zvuk-b2b-${managerName}-kp`;
        }
        
        async function saveAsPDF() {
            const fileName = getFileName() + '.pdf';
            const pdf = new jsPDF({
                orientation: 'landscape',
                unit: 'px',
                format: [1920, 1080]
            });

            const tempContainer = document.createElement('div');
            tempContainer.style.position = 'absolute';
            tempContainer.style.left = '-9999px';
            tempContainer.style.top = '0px';
            tempContainer.style.width = '1920px';
            tempContainer.style.height = '1080px';
            document.body.appendChild(tempContainer);
            
            for (let i = 0; i < slides.length; i++) {
                const slide = slides[i];
                const originalSlideIndex = currentSlideIndex; 
                showSlide(i + 1); 
                
                const slideContent = document.getElementById('currentSlide').cloneNode(true);
                slideContent.style.width = '1920px';
                slideContent.style.height = '1080px';
                slideContent.style.transform = 'none';
                slideContent.classList.remove('zoomed');
                
                tempContainer.innerHTML = '';
                tempContainer.appendChild(slideContent);
                
                await new Promise(resolve => setTimeout(resolve, 50));

                const canvas = await html2canvas(tempContainer, {
                    scale: 1,
                    logging: false,
                    useCORS: true,
                    width: 1920,
                    height: 1080,
                    letterRendering: true
                });

                const imgData = canvas.toDataURL('image/jpeg', 0.95);
                
                if (i > 0) {
                    pdf.addPage([1920, 1080], 'landscape');
                }
                
                pdf.addImage(imgData, 'JPEG', 0, 0, 1920, 1080);
                addLinksToPDF(pdf, slide, slideContent, i);
                
                showSlide(originalSlideIndex + 1);
            }
            
            document.body.removeChild(tempContainer);
            pdf.save(fileName);
        }

        function addLinksToPDF(pdf, slide, slideContent, pageIndex) {
            pdf.setPage(pageIndex + 1);
            
            const addLinkSafe = (element, url) => {
                if (!element || !url) return;

                const rect = element.getBoundingClientRect();
                const parentRect = slideContent.getBoundingClientRect();
                
                const x = rect.left - parentRect.left;
                const y = rect.top - parentRect.top;
                const width = rect.width;
                const height = rect.height;

                if (width > 0 && height > 0) {
                    pdf.link(x, y, width, height, { url });
                }
            };

            // General, Pricing Banners
            if (slide.type === 'general' || slide.type === 'pricing') {
                 const bannerElement = slideContent.querySelector('.preview-banner');
                 if (bannerElement) {
                     addLinkSafe(bannerElement.parentElement, bannerElement.parentElement.href);
                 }
            }

            // Pricing Manager
            if (slide.type === 'pricing') {
                const managerElement = slideContent.querySelector('.preview-manager');
                if (managerElement) {
                     addLinkSafe(managerElement.parentElement, managerElement.parentElement.href);
                }
                const qrElement = slideContent.querySelector('.preview-qr');
                if (qrElement) {
                    addLinkSafe(qrElement.parentElement, qrElement.parentElement.href)
                }
            }
            
            // Instruction Links
            if (slide.type === 'instruction') {
                addLinkSafe(slideContent.querySelector('#instructionLinkManager'), slideContent.querySelector('#instructionLinkManager').href);
                addLinkSafe(slideContent.querySelector('#instructionLinkComputer'), slideContent.querySelector('#instructionLinkComputer').href);
                addLinkSafe(slideContent.querySelector('#instructionLinkSmartphone'), slideContent.querySelector('#instructionLinkSmartphone').href);
            }

            // Playlist Link
            if (slide.type === 'playlist') {
                const playlistLinkEl = slideContent.querySelector('.preview-link');
                if (playlistLinkEl) addLinkSafe(playlistLinkEl, playlistLinkEl.href);
            }
           
            // Specific Image/Area Links
            const specialLinks = [
                { type: 'app', selector: 'a[href="https://zvuk-b2b.com/blog/1price"]', url: 'https://zvuk-b2b.com/blog/1price' },
                { type: 'creative', selector: 'a[href="https://zvuk-b2b.com/audio_ads"]', url: 'https://zvuk-b2b.com/audio_ads'},
                { type: 'creative', selector: 'a[href="https://zvuk-b2b.com/blog/1price"]', url: 'https://zvuk-b2b.com/blog/1price'},
                { type: 'creative', selector: 'a[href="https://zvuk-b2b.com/blog/letu"]', url: 'https://zvuk-b2b.com/blog/letu'},
                { type: 'partner', selector: 'a[href="https://zvuk-b2b.com/partners"]', url: 'https://zvuk-b2b.com/partners' },
                { type: 'bprofile', selector: 'a[href="https://zvuk-b2b.com/bprofile"]', url: 'https://zvuk-b2b.com/bprofile' },
                { type: 'videokp', selector: 'a[href="https://zvuk-b2b.com/video"]', url: 'https://zvuk-b2b.com/video' },
                { type: 'videocontent', selector: '.preview-link', url: 'https://zvuk-b2b.com/video' }
            ];

            specialLinks.forEach(item => {
                if (slide.type === item.type) {
                    const elements = slideContent.querySelectorAll(item.selector);
                    elements.forEach(element => {
                        addLinkSafe(element, item.url);
                    });
                }
            });

            // Premium slide - full slide link
            if (slide.type === 'premium') {
                pdf.link(0, 0, 1920, 1080, { url: 'https://zvuk-b2b.com/premium/' });
            }
        }
        
        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', function() {
            // Обработка изменений полей ввода
            document.getElementById('banner').addEventListener('change', updateCurrentSlide);
            document.getElementById('logos').addEventListener('change', updateCurrentSlide);
            document.getElementById('manager').addEventListener('change', updateCurrentSlide);
            document.getElementById('personalPhone').addEventListener('input', updateCurrentSlide);
            document.getElementById('price1Value').addEventListener('input', updateCurrentSlide);
            document.getElementById('price3Value1').addEventListener('input', updateCurrentSlide);
            document.getElementById('price3Value2').addEventListener('input', updateCurrentSlide);
            document.getElementById('price3Value3').addEventListener('input', updateCurrentSlide);
            document.getElementById('comment').addEventListener('input', updateCurrentSlide);
            document.getElementById('priceBanner').addEventListener('change', updateCurrentSlide);
            document.getElementById('playlist').addEventListener('change', updateCurrentSlide);
            document.getElementById('premiumPrice').addEventListener('input', updateCurrentSlide);
            document.getElementById('premiumComment').addEventListener('input', updateCurrentSlide);
            document.getElementById('videokpPrice').addEventListener('input', updateCurrentSlide);
            document.getElementById('videokpComment').addEventListener('input', updateCurrentSlide);
            
            // Инициализация кнопок слайдов
            updateSlideNumbers();
            
            // Показываем первый слайд и раскрываем его настройки
            showSlide(1);
            document.querySelector('.menu-header').click();
        });
    </script>
</body>
