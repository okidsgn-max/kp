<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор коммерческого предложения</title>
    <style>
        :root {
            --button-color: #00b398;
            --button-hover: #008f79;
            --button-text: white;
            --text-color: #667099;
            --active-color: #008f79;
            --input-bg: #f6f6f9;
            --input-border: hsl(228, 20%, 97%);
            --sidebar-width: 30vw;
            --preview-width: 70vw;
            --qr-size: 60px;
            --control-icon-size: 30px;
        }
        
        body {
            font-family: 'SB Sans', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            background-color: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        /* Pop-up for PDF generation */
        .popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px 40px;
            border-radius: 12px;
            z-index: 1001;
            font-size: 18px;
            font-weight: 500;
        }
        
        .menu-container {
            width: var(--sidebar-width);
            background-color: white;
            padding: 20px;
            height: 100%;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        
        .menu-header-container {
            display: flex;
            flex-direction: column;
            margin-bottom: 30px;
        }
        
        .menu-logo {
            height: 24px;
            width: auto;
            object-fit: contain;
            align-self: flex-start;
            margin-bottom: 16px;
        }
        
        .menu-title {
            color: #3d435c;
            font-weight: 600;
            font-size: 24px;
            font-family: 'SBSansText', sans-serif;
        }
        
        .menu-sections {
            flex-grow: 1;
            overflow-y: auto;
        }
        
        .menu-section-header {
            color: #3d435c;
            font-weight: 600;
            font-size: 16px;
        }
        
        .menu-section-header.active {
            color: var(--active-color);
        }
        
        .menu-label {
            color: #667099;
            font-weight: 600;
            font-size: 16px;
            display: block;
            margin-bottom: 8px;
        }
        
        .preview-container {
            width: var(--preview-width);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
            position: relative;
            background-color: #f8f8f8;
        }
        
        .preview-wrapper {
            position: relative;
            margin-bottom: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            height: 90%;
        }
        
        .preview-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
        }
        
        .delete-slide-btn {
            background-color: transparent;
            border: none;
            cursor: pointer;
            width: 24px;
            height: 24px;
            padding: 0;
        }
        
        .delete-slide-btn img {
            width: 100%;
            height: 100%;
        }
        
        .slide-controls-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            width: 100%;
        }
        
        .slide-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
        }
        
        #slideNumbers {
            display: flex;
            gap: 8px;
        }
        
        .control-icon {
            width: var(--control-icon-size);
            height: var(--control-icon-size);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .control-icon img {
            width: 24px;
            height: 24px;
        }
        
        .slide-number {
            width: var(--control-icon-size);
            height: var(--control-icon-size);
            border-radius: 50%;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 500;
            color: #3d435c;
            user-select: none;
            transition: transform 0.3s ease;
        }
        
        .slide-number.active {
            background-color: var(--button-color);
            color: white;
        }
        
        .slide-number.dragging {
            opacity: 0.5;
            transform: scale(1.2);
        }
        
        .slide-number.drop-target {
            transform: scale(1.1);
            background-color: var(--button-hover);
            color: white;
        }
        
        .preview-page {
            position: relative;
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            transform-origin: center center;
            cursor: pointer;
            aspect-ratio: 16 / 9; /* Пропорциональное масштабирование */
            margin: auto; /* Центрирование в контейнере */
        }
        
        .preview-page.zoomed {
            transform: scale(1.4);
            z-index: 100;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.4);
            max-width: 70vw;
            max-height: 70vh;
        }
        
        .preview-bg {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }
        
        .preview-banner {
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            width: 100%;
            object-fit: fill;
        }
        
        .preview-logos {
            position: absolute;
            bottom: 6%;
            left: 2%;
            width: 50%;
            max-height: 15%;
            object-fit: contain;
        }
        
        .preview-price {
            position: absolute;
            top: 65%;
            left: 3%;
            color: white;
            font-weight: bold;
            width: 50%;
            font-size: 22px; /* Base size for preview */
            font-family: Calibri, Arial, sans-serif;
        }
        
        .preview-comment {
            position: absolute;
            top: 60%;
            left: 3%;
            color: #D9D9D9;
            width:100%;
            font-weight: 500;
            font-size: 12px; /* Base size for preview */
        }
        
        .price-table {
            position: absolute;
            top: 55%;
            left: 3%;
            width:60%;
            color: white;
            border-collapse: collapse;
            font-size: 12px; /* Base size for preview */
            font-family: Calibri, Arial, sans-serif;
        }
        
        .price-table th, .price-table td {
            padding: 10px;
            text-align: left;
            border: 1px solid #303030;
        }
        
        .price-table th {
            background-color: rgba(0,0,0,0.3);
        }
        
        .preview-manager {
            position: absolute;
            bottom: 8%;
            left: 0%;
            width: 100%;
            object-fit: contain;
        }
        
        .preview-phone {
            position: absolute;
            bottom: 16%;
            left: 32%;
            color: white;
            font-weight: 500;
            font-size: 7px; /* Base size for preview */
        }
        
        .preview-qr {
            position: absolute;
            bottom: 8%;
            right: 39%;
            width: var(--qr-size);
            height: var(--qr-size);
            background-color: white;
            border-radius: 8px;
            padding:7px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .preview-qr img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .preview-link {
            position: absolute;
            bottom: 5%;
            right: 5%;
            color: transparent; 
        }
        
        .preview-video {
            position: absolute;
            bottom: 0%;
            left: 35%;
            width: 100px;
            height: 100px;
        }
        
        .preview-video img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .menu-section {
            margin-bottom: 8px;
            border-bottom: 1px solid #eee;
            padding-bottom: 2px;
        }
        
        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .menu-content {
            display: none;
            padding-left: 0px;
        }
        
        .menu-content.active {
            display: block;
        }
        
        .toggle-button {
            font-size: 26px;
            color: #3d435c;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid var(--input-border);
            background-color: var(--input-bg);
            border-radius: 8px;
            color: var(--text-color);
            font-weight: 500;
            font-size: 16px;
            font-family: 'SB Sans', sans-serif;
            box-sizing: border-box;
        }
        
        input[type="number"] {
            -moz-appearance: textfield;
        }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: var(--button-color);
        }
        
        .radio-group {
            margin-bottom: 15px;
        }
        
        .radio-option {
            margin-bottom: 0px;
            display: flex;
            align-items: baseline;
        }
        
        .radio-option input {
            width: auto;
            margin-right: 4px;
        }
        
        .radio-option label {
            color: var(--text-color);
            font-weight: 500;
            font-size: 16px;
        }
        
        .price-columns {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .price-column {
            flex: 1;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top:20px;
            position: sticky;
            bottom: 0;
            background: white;
            z-index: 10;
        }
        
        button {
            padding: 12px 12px;
            background-color: var(--button-color);
            color: var(--button-text);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'SB Sans', sans-serif;
            font-size: 16px;
            font-weight: 500;
            transition: background-color 0.3s;
            flex: 1;
        }
        
        button:hover {
            background-color: var(--button-hover);
        }
        
        .add-slide-btn {
            background-color: var(--button-color);
            color: white;
            margin-top: 10px;
        }
        
        .remove-slide-btn {
            background-color: #7F7F7F;
            color: white;
            margin-top: 10px;
        }
        
        .hidden {
            display: none;
        }
        
        .phone-type {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .phone-type label {
            display: flex;
            align-items: baseline;
            gap: 5px;
            color: var(--text-color);
            font-weight: 500;
            font-size: 16px;
        }

        .instruction-text {
            position: absolute;
            top: 40%;
            left: 3%;
            color: white;
            font-weight: 500;
            width: 60%;
            line-height: 1.2;
            font-size: 12px; /* Base size for preview */
        }

        .instruction-text a {
            color: var(--button-color);
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
        }

        /* ИЗМЕНЕНИЕ: Стили для кликабельных ассетов на слайде "Креативы" */
        .creative-asset-link {
            position: absolute;
            display: block;
        }
        .preview-mode .creative-asset-link {
            width: 78px;  /* 130px * 0.6 */
            height: 78px;
            transition: all 0.2s ease-in-out;
        }
        .preview-mode .creative-asset-link:hover {
            transform: scale(1.1);
        }
        .pdf-mode .creative-asset-link {
            width: 130px;
            height: 130px;
        }
        .creative-asset-link img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
            
        /* ---- SCALING STYLES FOR PDF vs PREVIEW ---- */
        
        /* PDF Mode: Increase sizes for high-resolution export */
        .pdf-mode .preview-price {
            font-size: 44px; /* Scaled size for PDF */
        }
        .pdf-mode .preview-comment {
            font-size: 24px; /* Scaled size for PDF */
        }
        .pdf-mode .price-table {
            font-size: 24px; /* Scaled size for PDF */
        }
        .pdf-mode .price-table th, .pdf-mode .price-table td {
             padding: 20px;
        }
        .pdf-mode .preview-phone {
            font-size: 14px; /* Scaled size for PDF */
        }
        .pdf-mode .instruction-text {
            font-size: 24px; /* Scaled size for PDF */
            line-height: 1.5;
        }

        /* ---- END SCALING STYLES ---- */
      
        /* Специальные стили для Firefox */
        @-moz-document url-prefix() {
            .menu-container {
                scrollbar-width: thin;
            }
        }

        /* ---- МОБИЛЬНАЯ ВЕРСИЯ ---- */
        @media (max-width: 800px) {
            body {
                flex-direction: column;
                height: auto;
                overflow: auto; /* Включаем скролл для всей страницы */
            }

            .menu-container {
                width: 100%;
                height: auto;
                overflow-y: visible;
                box-shadow: none;
                padding: 15px;
                box-sizing: border-box;
            }
            
            .action-buttons {
                 /* Кнопка "в PDF" будет внизу блока настроек */
                position: relative;
                bottom: auto;
                padding: 20px 0 10px 0;
                border-top: 1px solid #eee;
            }

            .preview-container {
                width: 100%;
                height: auto;
                padding: 10px;
                box-sizing: border-box;
            }
            
            .preview-wrapper {
                height: auto;
            }

            .preview-page {
                /* Увеличение на мобильных устройствах отключено */
                cursor: default;
            }
            
            /* Скрываем иконку зума на мобильных */
            .control-icon[onclick="toggleZoom()"] {
                display: none;
            }
            
            .menu-logo {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
